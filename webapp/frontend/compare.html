<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawGraph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

  #top-bar {
    height: 68px;
    background: linear-gradient(180deg, rgba(16,16,18,0.98) 0%, rgba(12,12,14,0.96) 100%);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 20px;
    z-index: 50;
  }
  #top-bar .brand {
    font-size: 24px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }
  #top-bar .brand .claw {
    background: linear-gradient(135deg, #3b82f6, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #top-bar .divider {
    width: 1px;
    height: 28px;
    background: rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  #top-bar .repo-input-wrap {
    flex: 1;
    max-width: 540px;
    display: flex;
    gap: 0;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  #top-bar .repo-input-wrap:focus-within { border-color: rgba(59,130,246,0.5); }
  #top-bar .repo-input-wrap input {
    flex: 1;
    background: transparent;
    border: none;
    color: #fff;
    padding: 11px 16px;
    font-size: 15px;
    outline: none;
    font-family: inherit;
  }
  #top-bar .repo-input-wrap input::placeholder { color: #4a4a4a; }
  #top-bar .repo-go-btn {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: #fff;
    border: none;
    padding: 11px 22px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
    letter-spacing: 0.2px;
  }
  #top-bar .repo-go-btn:hover { opacity: 0.9; }

  .panels {
    display: flex;
    height: calc(100vh - 68px);
  }
  .panel {
    flex: 1;
    position: relative;
  }
  .panel:first-child { border-right: 1px solid rgba(255,255,255,0.04); }
  .panel-label {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 12, 0.8);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 5px 16px;
    color: #999;
    font-size: 11px;
    font-weight: 600;
    z-index: 10;
    pointer-events: none;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .panel iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>
<body>
<div id="top-bar">
  <span class="brand"><span class="claw">Claw</span>Graph</span>
  <div class="divider"></div>
  <div class="repo-input-wrap">
    <input type="text" id="repo-input" placeholder="Enter any GitHub repo"
           onkeydown="if(event.key==='Enter'){go()}">
    <button class="repo-go-btn" onclick="go()">Visualize</button>
  </div>
</div>
<div class="panels">
  <div class="panel">
    <div class="panel-label">OpenAI Codex</div>
    <iframe src="/index.html?embed=true&label=Info-Codex&infoside=left&nohowto=true&nudge=right"></iframe>
  </div>
  <div class="panel">
    <div class="panel-label">nirholas / claude-code</div>
    <iframe src="/index.html?repo=nirholas/claude-code&embed=true&label=Info-Claude+Code&infoside=right&nohowto=true&noback=true&nudge=left"></iframe>
  </div>
</div>
<script>
function go() {
  var v = document.getElementById('repo-input').value.trim();
  if (v) window.location.href = '/index.html?repo=' + encodeURIComponent(v);
}
</script>
</body>
</html>
