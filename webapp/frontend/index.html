<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Graph Visualization</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  canvas { display: block; }
  #tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(20, 20, 20, 0.95);
    color: #e0e0e0;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.4;
    border: 1px solid rgba(255, 255, 255, 0.15);
    display: none;
    max-width: 400px;
    white-space: nowrap;
  }
  #tooltip .label { color: #888; font-size: 11px; }
  #tooltip .value { color: #fff; font-weight: 500; }
  #legend {
    position: absolute;
    bottom: 64px;
    right: 16px;
    background: rgba(20, 20, 20, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 14px 18px;
    color: #ccc;
    font-size: 13px;
  }
  #legend h3 { margin-bottom: 10px; color: #fff; font-size: 14px; }
  .legend-section { margin-bottom: 8px; }
  .legend-section:last-child { margin-bottom: 0; }
  .legend-section-title { color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  .legend-line { width: 16px; height: 3px; border-radius: 1px; }
  #stats {
    position: absolute;
    bottom: 64px;
    left: 16px;
    background: rgba(20, 20, 20, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 10px 14px;
    color: #888;
    font-size: 12px;
  }
  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #888;
    font-size: 16px;
  }
  #controls {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(20, 20, 20, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 14px 18px;
    color: #ccc;
    font-size: 12px;
    width: 320px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #444 transparent;
  }
  #controls::-webkit-scrollbar { width: 5px; }
  #controls::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  #controls h3 {
    color: #fff;
    font-size: 13px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  #controls h3 .toggle { font-size: 10px; color: #888; }
  .ctrl-group {
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding-bottom: 10px;
  }
  .ctrl-group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .ctrl-group-title {
    color: #aaa;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .ctrl-row {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    gap: 8px;
  }
  .ctrl-row label {
    flex: 0 0 100px;
    color: #999;
    font-size: 11px;
  }
  .ctrl-row input[type="range"] {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: #333;
    border-radius: 2px;
    outline: none;
  }
  .ctrl-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #888;
    cursor: pointer;
  }
  .ctrl-row input[type="range"]::-webkit-slider-thumb:hover { background: #aaa; }
  .ctrl-row .ctrl-val {
    flex: 0 0 48px;
    text-align: right;
    color: #ccc;
    font-size: 11px;
    font-family: monospace;
  }
  #controls .ctrl-body { display: block; }
  #controls .ctrl-body.collapsed { display: none; }
  .ctrl-btn {
    background: #333;
    color: #ccc;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    margin-right: 6px;
    margin-top: 4px;
  }
  .ctrl-btn:hover { background: #444; color: #fff; }
  #appearance {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(20, 20, 20, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 14px 18px;
    color: #ccc;
    font-size: 12px;
    width: 320px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #444 transparent;
  }
  #appearance::-webkit-scrollbar { width: 5px; }
  #appearance::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  #appearance h3 {
    color: #fff;
    font-size: 13px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  #appearance h3 .toggle { font-size: 10px; color: #888; }
  #appearance .ctrl-body { display: block; }
  #appearance .ctrl-body.collapsed { display: none; }
  .ctrl-check {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    gap: 8px;
  }
  .ctrl-check label {
    color: #999;
    font-size: 11px;
    cursor: pointer;
  }
  .ctrl-check input[type="checkbox"] {
    accent-color: #888;
    cursor: pointer;
  }
  .tri-switch {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    gap: 8px;
  }
  .tri-switch-btns {
    display: flex;
    flex-shrink: 0;
    border: 1px solid #444;
    border-radius: 4px;
    overflow: hidden;
  }
  .tri-switch-btn {
    background: transparent;
    color: #555;
    border: none;
    border-right: 1px solid #444;
    padding: 2px 7px;
    font-size: 11px;
    cursor: pointer;
    line-height: 1.4;
  }
  .tri-switch-btn:last-child { border-right: none; }
  .tri-switch-btn:hover { color: #999; }
  .tri-switch-btn.active-visible { background: #1a3a2a; color: #10b981; }
  .tri-switch-btn.active-hidden { background: #2a2a1a; color: #eab308; }
  .tri-switch-btn.active-off { background: #2a1a1a; color: #ef4444; }
  .tri-switch-label {
    color: #999;
    font-size: 11px;
  }
  /* Timeline */
  #timeline {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    background: rgba(15, 15, 15, 0.95);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    user-select: none;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
    z-index: 10;
  }
  #timeline-label-start, #timeline-label-end {
    color: #aaa;
    font-size: 11px;
    font-family: monospace;
    min-width: 80px;
    white-space: nowrap;
  }
  #timeline-label-end { text-align: right; }
  #timeline-track {
    position: relative;
    flex: 1;
    height: 28px;
    background: #111;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
  }
  #timeline-hist {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-end;
    gap: 0;
    opacity: 0.3;
  }
  #timeline-hist .hist-bar {
    flex: 1;
    background: #555;
    min-width: 0;
  }
  #timeline-fill {
    position: absolute;
    top: 0;
    height: 100%;
    background: rgba(59, 130, 246, 0.25);
    pointer-events: none;
  }
  .timeline-handle {
    position: absolute;
    top: 0;
    width: 10px;
    height: 100%;
    background: rgba(140, 140, 140, 0.8);
    border-radius: 3px;
    cursor: ew-resize;
    z-index: 2;
    transition: background 0.1s;
  }
  .timeline-handle:hover, .timeline-handle.active { background: rgba(200, 200, 200, 0.9); }
  /* Mode switch */
  .mode-switch {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    gap: 8px;
  }
  .mode-switch-btns {
    display: flex;
    flex-shrink: 0;
    border: 1px solid #444;
    border-radius: 4px;
    overflow: hidden;
  }
  .mode-switch-btn {
    background: transparent;
    color: #666;
    border: none;
    border-right: 1px solid #444;
    padding: 3px 12px;
    font-size: 11px;
    cursor: pointer;
    line-height: 1.4;
  }
  .mode-switch-btn:last-child { border-right: none; }
  .mode-switch-btn:hover { color: #999; }
  .mode-switch-btn.active { background: #1a2a3a; color: #3b82f6; }
  .ctrl-row.disabled label,
  .ctrl-row.disabled .ctrl-val { opacity: 0.3; }
  .ctrl-row.disabled input[type="range"] { opacity: 0.3; pointer-events: none; }
  .depth-slider-wrap { flex: 1; display: flex; flex-direction: column; gap: 0; }
  .depth-slider-wrap input[type="range"] { width: 100%; margin: 0; }
  .depth-ticks {
    display: flex;
    justify-content: space-between;
    padding: 0 2px;
  }
  .depth-ticks span {
    font-size: 9px;
    color: #666;
    font-family: monospace;
    width: 12px;
    text-align: center;
  }
  .ctrl-row.disabled .depth-ticks span { opacity: 0.3; }

</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="tooltip"></div>
<div id="appearance">
  <h3 onclick="document.getElementById('appear-body').classList.toggle('collapsed')">
    Appearance <span class="toggle">&#9660;</span>
  </h3>
  <div class="ctrl-body" id="appear-body"></div>
</div>
<div id="legend">
  <h3>Knowledge Graph</h3>
  <div class="legend-section">
    <div class="legend-section-title">Nodes</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffffff"></div> Codex (root)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> Contributors</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> Files (active)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#6b7280"></div> Files (deleted)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div> Crates</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ec4899"></div> Major Concepts</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f472b6"></div> Minor Concepts</div>
  </div>
  <div class="legend-section">
    <div class="legend-section-title">Edges</div>
    <div class="legend-item"><div class="legend-line" style="background:rgba(255,255,255,0.6)"></div> Authored</div>
    <div class="legend-item"><div class="legend-line" style="background:#ef4444"></div> Depends on (directed)</div>
    <div class="legend-item"><div class="legend-line" style="background:#10b981"></div> Contains</div>
    <div class="legend-item"><div class="legend-line" style="background:#a855f7"></div> Contributed to</div>
    <div class="legend-item"><div class="legend-line" style="background:#ec4899"></div> Has minor</div>
    <div class="legend-item"><div class="legend-line" style="background:#06b6d4"></div> Tagged with</div>
  </div>
</div>
<div id="controls">
  <h3 onclick="document.getElementById('ctrl-body').classList.toggle('collapsed')">
    Force Simulation <span class="toggle">&#9660;</span>
  </h3>
  <div class="ctrl-body" id="ctrl-body"></div>
</div>
<div id="stats" style="display:none"></div>
<div id="timeline">
  <span id="timeline-label-start"></span>
  <div id="timeline-track">
    <div id="timeline-hist"></div>
    <div id="timeline-fill"></div>
    <div class="timeline-handle" id="handle-start"></div>
    <div class="timeline-handle" id="handle-end"></div>
  </div>
  <span id="timeline-label-end"></span>
</div>
<div id="loading">Loading knowledge graph...</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(async function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const tooltip = document.getElementById('tooltip');
  const statsEl = document.getElementById('stats');
  const loadingEl = document.getElementById('loading');

  // High-DPI support
  let width, height, dpr;
  function resize() {
    dpr = window.devicePixelRatio || 1;
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', () => {
    resize();
    centerX = width / 2;
    centerY = height / 2;
    draw();
    pushState();
  });

  // Colors
  const CONTRIBUTOR_COLOR = '#f59e0b';
  const FILE_COLOR = '#3b82f6';
  const DELETED_FILE_COLOR = '#6b7280';
  const CRATE_COLOR = '#10b981';
  const MAJOR_CONCEPT_COLOR = '#ec4899';
  const MINOR_CONCEPT_COLOR = '#f472b6';
  const ROOT_COLOR = '#ffffff';

  // Edge colors as RGB components (alpha applied dynamically)
  const EDGE_RGB = {
    authored: '255, 255, 255',
    depends_on: '239, 68, 68',
    contains: '16, 185, 129',
    contributed_to: '168, 85, 247',
    has_minor: '236, 72, 153',
    has_major: '255, 255, 255',
    tagged_with: '6, 182, 212',
  };

  // Perceived-luminance correction so all edge colors look equally bright.
  // Uses rec. 709 coefficients: L = 0.2126*R + 0.7152*G + 0.0722*B
  function luminance(r, g, b) { return 0.2126 * r + 0.7152 * g + 0.0722 * b; }
  const refLum = luminance(255, 255, 255);
  const EDGE_OPACITY_SCALE = {
    authored:   1,
    depends_on: refLum / luminance(239, 68, 68),
    contains:   refLum / luminance(16, 185, 129),
    contributed_to: refLum / luminance(168, 85, 247),
    has_minor: refLum / luminance(236, 72, 153),
    has_major: 1,
    tagged_with: refLum / luminance(6, 182, 212),
  };

  // Load data
  let raw;
  try {
    const resp = await fetch('/knowledge_graph.json');
    raw = await resp.json();
  } catch (e) {
    loadingEl.textContent = 'Failed to load knowledge_graph.json: ' + e.message;
    return;
  }
  loadingEl.style.display = 'none';

  // Build ALL nodes (kept permanently — D3 adds x/y/vx/vy to these)
  const allNodes = [];
  const nodeMap = new Map();

  for (const c of raw.nodes.contributors) {
    const node = {
      id: c.id,
      name: c.name,
      type: 'contributor',
      totalCommits: c.total_commits,
      firstCommitAt: c.first_commit_at || null,
      role: c.role || null,
      contributions: c.contributions || null,
      createdAt: c.first_commit_at ? new Date(c.first_commit_at).getTime() : null,
      radius: Math.max(4, Math.min(16, 3 + Math.sqrt(c.total_commits))),
    };
    allNodes.push(node);
    nodeMap.set(c.id, node);
  }

  for (const f of raw.nodes.files) {
    const loc = f.latest_line_count || 0;
    const node = {
      id: f.id,
      name: f.name,
      type: 'file',
      deleted: f.deleted,
      fileType: f.file_type,
      lineCount: loc,
      summary: f.summary || null,
      createdAt: f.created_at ? new Date(f.created_at).getTime() : null,
      radius: loc > 0 ? Math.max(1.5, Math.min(12, 1.5 + Math.sqrt(loc) * 0.3)) : 1.5,
    };
    allNodes.push(node);
    nodeMap.set(f.id, node);
  }

  for (const cr of (raw.nodes.crates || [])) {
    const node = {
      id: cr.id,
      name: cr.name,
      type: 'crate',
      rootDir: cr.root_dir,
      edition: cr.edition,
      hasLib: cr.has_lib,
      hasBin: cr.has_bin,
      createdAt: cr.created_at ? new Date(cr.created_at).getTime() : null,
      radius: 8,
    };
    allNodes.push(node);
    nodeMap.set(cr.id, node);
  }

  for (const mc of (raw.nodes.major_concepts || [])) {
    const node = {
      id: mc.id,
      name: mc.name,
      type: 'major_concept',
      definition: mc.definition,
      evidence: mc.evidence || [],
      createdAt: null,
      radius: 10,
    };
    allNodes.push(node);
    nodeMap.set(mc.id, node);
  }

  for (const mc of (raw.nodes.minor_concepts || [])) {
    const node = {
      id: mc.id,
      name: mc.name,
      type: 'minor_concept',
      definition: mc.definition,
      evidence: mc.evidence || [],
      majorConcept: mc.major_concept,
      createdAt: null,
      radius: 6,
    };
    allNodes.push(node);
    nodeMap.set(mc.id, node);
  }

  // Synthetic root node — fixed at center, connects to major concepts
  const ROOT_ID = '__root__';
  const rootNode = {
    id: ROOT_ID,
    name: 'Codex',
    type: 'root',
    createdAt: null,
    radius: 14,
  };
  allNodes.push(rootNode);
  nodeMap.set(ROOT_ID, rootNode);

  // Build commit timestamp lookup
  const commitTs = new Map();
  if (raw.commits) {
    for (const [hash, c] of Object.entries(raw.commits)) {
      if (c.timestamp) commitTs.set(hash, new Date(c.timestamp).getTime());
    }
  }

  // Raw link data (never passed to D3 — source/target stay as strings)
  const allLinksRaw = raw.edges.map(e => {
    const link = {
      source: e.source,
      target: e.target,
      type: e.type || 'authored',
      commits: e.commits ? e.commits.length : 0,
    };
    // For authored edges, store earliest/latest commit timestamp
    if (e.commits && e.commits.length > 0) {
      let earliest = Infinity, latest = -Infinity;
      for (const h of e.commits) {
        const ts = commitTs.get(h);
        if (ts !== undefined) {
          if (ts < earliest) earliest = ts;
          if (ts > latest) latest = ts;
        }
      }
      if (earliest !== Infinity) { link.firstAt = earliest; link.lastAt = latest; }
    }
    // For contributed_to edges, store first contribution timestamp
    if (e.first_contribution_at) {
      link.firstContributionAt = new Date(e.first_contribution_at).getTime();
      link.totalCommits = e.total_commits || 0;
    }
    return link;
  });

  // Synthetic edges: root → each major concept
  for (const n of allNodes) {
    if (n.type === 'major_concept') {
      allLinksRaw.push({ source: ROOT_ID, target: n.id, type: 'has_major', commits: 0 });
    }
  }

  // Compute global time range and commit histogram for timeline
  const allTimestamps = [];
  for (const n of allNodes) { if (n.createdAt != null) allTimestamps.push(n.createdAt); }
  for (const ts of commitTs.values()) allTimestamps.push(ts);
  allTimestamps.sort((a, b) => a - b);
  const timeMin = allTimestamps.length ? allTimestamps[0] : 0;
  const timeMax = allTimestamps.length ? allTimestamps[allTimestamps.length - 1] : 1;

  // Commit histogram (for track background density)
  const HISTOGRAM_BINS = 200;
  const commitHist = new Float32Array(HISTOGRAM_BINS);
  const timeSpan = timeMax - timeMin || 1;
  for (const ts of commitTs.values()) {
    const bin = Math.min(HISTOGRAM_BINS - 1, Math.floor((ts - timeMin) / timeSpan * HISTOGRAM_BINS));
    commitHist[bin]++;
  }
  const histMax = Math.max(1, ...commitHist);

  // Free raw data
  raw = null;

  // --- Timeline setup ---
  let tlStart = timeMin;
  let tlEnd = timeMax;

  const tlTrack = document.getElementById('timeline-track');
  const tlFill = document.getElementById('timeline-fill');
  const tlHistEl = document.getElementById('timeline-hist');
  const tlLabelStart = document.getElementById('timeline-label-start');
  const tlLabelEnd = document.getElementById('timeline-label-end');
  const handleStart = document.getElementById('handle-start');
  const handleEnd = document.getElementById('handle-end');

  // Build histogram bars
  for (let i = 0; i < HISTOGRAM_BINS; i++) {
    const bar = document.createElement('div');
    bar.className = 'hist-bar';
    bar.style.height = (commitHist[i] / histMax * 100) + '%';
    tlHistEl.appendChild(bar);
  }

  function fmtDate(ms) {
    const d = new Date(ms);
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function tlFrac(ms) { return (ms - timeMin) / timeSpan; }

  function updateTimeline() {
    const sf = tlFrac(tlStart);
    const ef = tlFrac(tlEnd);
    tlFill.style.left = (sf * 100) + '%';
    tlFill.style.width = ((ef - sf) * 100) + '%';
    handleStart.style.left = (sf * 100) + '%';
    handleEnd.style.left = 'calc(' + (ef * 100) + '% - 10px)';
    tlLabelStart.textContent = fmtDate(tlStart);
    tlLabelEnd.textContent = fmtDate(tlEnd);
  }
  updateTimeline();

  // Drag handles
  function handleDrag(handleEl, isEnd) {
    let dragging = false;
    function onDown(e) {
      e.preventDefault();
      dragging = true;
      handleEl.classList.add('active');
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }
    function onMove(e) {
      if (!dragging) return;
      const rect = tlTrack.getBoundingClientRect();
      let frac = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      const ms = timeMin + frac * timeSpan;
      if (isEnd) {
        tlEnd = Math.max(tlStart + timeSpan * 0.002, ms);
      } else {
        tlStart = Math.min(tlEnd - timeSpan * 0.002, ms);
      }
      updateTimeline();
      rebuildGraph();
    }
    function onUp() {
      dragging = false;
      handleEl.classList.remove('active');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    handleEl.addEventListener('mousedown', onDown);
  }
  handleDrag(handleStart, false);
  handleDrag(handleEnd, true);

  // Click on track to jump the nearest handle
  tlTrack.addEventListener('click', (e) => {
    if (e.target.classList.contains('timeline-handle')) return;
    const rect = tlTrack.getBoundingClientRect();
    const frac = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    const ms = timeMin + frac * timeSpan;
    // Move whichever handle is closer
    const dStart = Math.abs(ms - tlStart);
    const dEnd = Math.abs(ms - tlEnd);
    if (dStart < dEnd) {
      tlStart = Math.min(tlEnd - timeSpan * 0.002, ms);
    } else {
      tlEnd = Math.max(tlStart + timeSpan * 0.002, ms);
    }
    updateTimeline();
    rebuildGraph();
  });

  // --- Active simulation data (rebuilt when "off" toggles change) ---
  let nodes = [];
  let links = [];
  let adjacency = new Map();

  // --- Visibility state: 'visible' | 'hidden' | 'off' ---
  const vis = {
    contributors: 'visible',
    activeSource: 'visible',
    otherFiles: 'off',
    crates: 'visible',
    majorConcepts: 'visible',
    minorConcepts: 'visible',
    authored: 'visible',
    dependsOn: 'visible',
    contains: 'visible',
    contributedTo: 'visible',
    hasMinor: 'visible',
    taggedWith: 'visible',
  };

  // Source code file extensions
  const SOURCE_CODE_EXTS = new Set([
    'rs', 'py', 'js', 'ts', 'jsx', 'tsx', 'mjs', 'cjs',
    'go', 'c', 'cpp', 'cc', 'cxx', 'h', 'hpp', 'hxx',
    'java', 'kt', 'kts', 'scala', 'cs', 'fs', 'rb', 'php',
    'swift', 'm', 'mm', 'r', 'lua', 'pl', 'pm', 'sh', 'bash',
    'zsh', 'ps1', 'bat', 'hs', 'ml', 'mli', 'ex', 'exs',
    'erl', 'clj', 'cljs', 'dart', 'asm', 's', 'sql',
    'html', 'css', 'scss', 'less', 'vue', 'svelte',
  ]);

  function isActiveSourceCode(node) {
    return node.type === 'file' && !node.deleted && SOURCE_CODE_EXTS.has(node.fileType);
  }

  function nodeTypeState(node) {
    if (node.type === 'root') return 'visible'; // always visible
    if (node.type === 'contributor') return vis.contributors;
    if (node.type === 'crate') return vis.crates;
    if (node.type === 'major_concept') return vis.majorConcepts;
    if (node.type === 'minor_concept') return vis.minorConcepts;
    if (node.type === 'file') return isActiveSourceCode(node) ? vis.activeSource : vis.otherFiles;
    return vis.otherFiles;
  }

  function linkTypeState(link) {
    if (link.type === 'authored') return vis.authored;
    if (link.type === 'depends_on') return vis.dependsOn;
    if (link.type === 'contains') return vis.contains;
    if (link.type === 'contributed_to') return vis.contributedTo;
    if (link.type === 'has_minor') return vis.hasMinor;
    if (link.type === 'has_major') return vis.majorConcepts; // tied to major concepts visibility
    if (link.type === 'tagged_with') return vis.taggedWith;
    return 'visible';
  }

  // Timeline filter: node created within [tlStart, tlEnd]
  function nodeInTimeRange(node) {
    if (node.createdAt == null) return true; // no timestamp → always show
    return node.createdAt >= tlStart && node.createdAt <= tlEnd;
  }

  // Timeline filter for edges
  function linkInTimeRange(link) {
    if (link.type === 'authored') {
      // Show if any commit falls in the time range
      if (link.firstAt != null) return link.lastAt >= tlStart && link.firstAt <= tlEnd;
      return true; // no timestamp data → show
    }
    if (link.type === 'contributed_to') {
      if (link.firstContributionAt != null) return link.firstContributionAt <= tlEnd;
      return true;
    }
    // depends_on / contains: visible when both endpoints pass
    return true;
  }

  // For draw: is this node rendered?
  function nodeDrawn(node) {
    return nodeTypeState(node) === 'visible';
  }

  // For draw: is this link rendered?
  function linkDrawn(link) {
    const s = link.source;
    const t = link.target;
    if (!nodeDrawn(s) || !nodeDrawn(t)) return false;
    return linkTypeState(link) === 'visible';
  }

  function getNodeScale(node) {
    if (node.type === 'root') return conceptScale;
    if (node.type === 'contributor') return contributorScale;
    if (node.type === 'crate') return crateScale;
    if (node.type === 'major_concept' || node.type === 'minor_concept') return conceptScale;
    return fileScale;
  }

  function updateStats() {
    const nc = nodes.filter(n => n.type === 'contributor').length;
    const nf = nodes.filter(n => n.type === 'file').length;
    const ncr = nodes.filter(n => n.type === 'crate').length;
    const ncon = nodes.filter(n => n.type === 'major_concept' || n.type === 'minor_concept').length;
    statsEl.style.display = 'block';
    statsEl.textContent = `${nc} contributors | ${nf} files | ${ncr} crates | ${ncon} concepts | ${links.length} edges`;
  }

  // Radial layout radii (mutable via controls)
  const RING_RADII = [200, 400, 550, 800, 1000]; // [concepts, minors, files_near, files_far, contributors]
  let centerX = width / 2, centerY = height / 2;

  // Track previous node set for positioning new nodes near the trigger
  let prevNodeIds = new Set();

  function rebuildGraph(triggerNode) {
    hoveredNode = null;
    tooltip.style.display = 'none';

    const allowedIds = new Set();
    allowedIds.add(ROOT_ID);
    let edgeFilter;

    if (mode === 'overview') {
      // Overview: show all nodes (respecting visibility 'off' and timeline)
      for (const n of allNodes) {
        if (nodeTypeState(n) !== 'off' && nodeInTimeRange(n)) allowedIds.add(n.id);
      }
      edgeFilter = l => linkTypeState(l) !== 'off' && linkInTimeRange(l);
    } else if (activeContributor) {
      // Contributor view: root + concepts + contributor + authored files + concept connections
      for (const mc of majorConceptNodes) allowedIds.add(mc.id);
      allowedIds.add(activeContributor.id);
      const authoredFiles = contributorToFiles.get(activeContributor.id) || new Set();
      for (const fid of authoredFiles) allowedIds.add(fid);
      // Include minor concepts that tag the authored files
      const relatedConcepts = new Set();
      for (const [cid, taggedFiles] of conceptToFiles) {
        for (const fid of authoredFiles) {
          if (taggedFiles.has(fid)) { relatedConcepts.add(cid); allowedIds.add(cid); break; }
        }
      }
      edgeFilter = l => {
        if (l.type === 'has_major') return true;
        if (l.type === 'authored' && l.source === activeContributor.id) return true;
        if (l.type === 'tagged_with' && authoredFiles.has(l.target)) return true;
        if (l.type === 'has_minor' && relatedConcepts.has(l.target)) return true;
        return false;
      };
    } else if (activeFile) {
      // File view: root + concept context + file + its contributors
      if (activeMajor) {
        allowedIds.add(activeMajor.id);
        if (activeMinor) allowedIds.add(activeMinor.id);
      }
      allowedIds.add(activeFile.id);
      const fileContribs = fileToContributors.get(activeFile.id) || new Set();
      for (const cid of fileContribs) allowedIds.add(cid);
      edgeFilter = l => {
        if (activeMajor && l.type === 'has_major' && l.target === activeMajor.id) return true;
        if (activeMinor && l.type === 'has_minor' && l.source === activeMajor.id && l.target === activeMinor.id) return true;
        if (l.type === 'tagged_with' && l.target === activeFile.id) return true;
        if (l.type === 'authored' && l.target === activeFile.id) return true;
        return false;
      };
    } else if (activeMajor && activeMinor) {
      // Minor concept drill-down: root + major + minor + minor's files
      allowedIds.add(activeMajor.id);
      allowedIds.add(activeMinor.id);
      const minorFiles = conceptToFiles.get(activeMinor.id) || new Set();
      for (const fid of minorFiles) allowedIds.add(fid);
      edgeFilter = l => {
        if (l.type === 'has_major' && l.target === activeMajor.id) return true;
        if (l.type === 'has_minor' && l.source === activeMajor.id && l.target === activeMinor.id) return true;
        if (l.type === 'tagged_with' && l.source === activeMinor.id) return true;
        return false;
      };
    } else if (activeMajor) {
      // Major concept drill-down: root + major + its minors + DIRECT files only
      allowedIds.add(activeMajor.id);
      for (const m of (majorToMinorNodes.get(activeMajor.id) || [])) allowedIds.add(m.id);
      const directFiles = conceptToFiles.get(activeMajor.id) || new Set();
      for (const fid of directFiles) allowedIds.add(fid);
      edgeFilter = l => {
        if (l.type === 'has_major' && l.target === activeMajor.id) return true;
        if (l.type === 'has_minor' && l.source === activeMajor.id) return true;
        if (l.type === 'tagged_with' && l.source === activeMajor.id) return true;
        return false;
      };
    } else {
      // Level 1: root + all major concepts
      for (const mc of majorConceptNodes) allowedIds.add(mc.id);
      edgeFilter = l => l.type === 'has_major';
    }

    nodes = allNodes.filter(n => allowedIds.has(n.id) && nodeInTimeRange(n));
    const activeIds = new Set(nodes.map(n => n.id));

    links = allLinksRaw.filter(l => {
      if (!activeIds.has(l.source) || !activeIds.has(l.target)) return false;
      return edgeFilter(l);
    }).map(l => ({ ...l }));

    // Rebuild adjacency
    adjacency = new Map();
    for (const l of links) {
      if (!adjacency.has(l.source)) adjacency.set(l.source, new Set());
      if (!adjacency.has(l.target)) adjacency.set(l.target, new Set());
      adjacency.get(l.source).add(l.target);
      adjacency.get(l.target).add(l.source);
    }

    // --- Positioning & simulation ---
    if (mode === 'overview') {
      // Overview: pin all nodes on concentric rings (no animation)
      const mcInView = nodes.filter(n => n.type === 'major_concept');
      const nMC = mcInView.length || 1;
      const wedge = 2 * Math.PI / nMC;
      const mcAngle = new Map();
      mcInView.forEach((mc, i) => {
        const a = (i / nMC) * 2 * Math.PI - Math.PI / 2;
        mcAngle.set(mc.id, a);
        mc.x = mc.fx = centerX + RING_RADII[0] * Math.cos(a);
        mc.y = mc.fy = centerY + RING_RADII[0] * Math.sin(a);
      });
      for (const mc of mcInView) {
        const ba = mcAngle.get(mc.id);
        const minorIds = majorToMinors.get(mc.id) || new Set();
        const minors = nodes.filter(n => minorIds.has(n.id));
        const sp = wedge * 0.85;
        minors.forEach((mn, j) => {
          const a = ba - sp / 2 + (j + 0.5) / Math.max(minors.length, 1) * sp;
          mn.x = mn.fx = centerX + RING_RADII[1] * Math.cos(a);
          mn.y = mn.fy = centerY + RING_RADII[1] * Math.sin(a);
        });
      }
      for (const mc of mcInView) {
        const ba = mcAngle.get(mc.id);
        const sectorFiles = nodes.filter(n => n.type === 'file' && fileToMajor.get(n.id) === mc.id);
        const sp = wedge * 0.85;
        sectorFiles.forEach((f, j) => {
          const a = ba - sp / 2 + (j + 0.5) / Math.max(sectorFiles.length, 1) * sp;
          const r = sectorFiles.length > 1
            ? RING_RADII[2] + (RING_RADII[3] - RING_RADII[2]) * (j / (sectorFiles.length - 1))
            : (RING_RADII[2] + RING_RADII[3]) / 2;
          f.x = f.fx = centerX + r * Math.cos(a);
          f.y = f.fy = centerY + r * Math.sin(a);
        });
      }
      const unassigned = nodes.filter(n => n.type === 'file' && !fileToMajor.has(n.id));
      unassigned.forEach((f, i) => {
        const a = (i / Math.max(unassigned.length, 1)) * 2 * Math.PI;
        const r = (RING_RADII[2] + RING_RADII[3]) / 2;
        f.x = f.fx = centerX + r * Math.cos(a);
        f.y = f.fy = centerY + r * Math.sin(a);
      });
      const contribs = nodes.filter(n => n.type === 'contributor');
      contribs.forEach((c, i) => {
        const a = (i / Math.max(contribs.length, 1)) * 2 * Math.PI - Math.PI / 2;
        c.x = c.fx = centerX + RING_RADII[4] * Math.cos(a);
        c.y = c.fy = centerY + RING_RADII[4] * Math.sin(a);
      });
      const crateR = (RING_RADII[3] + RING_RADII[4]) / 2;
      const crates = nodes.filter(n => n.type === 'crate');
      crates.forEach((cr, i) => {
        const a = (i / Math.max(crates.length, 1)) * 2 * Math.PI - Math.PI / 2;
        cr.x = cr.fx = centerX + crateR * Math.cos(a);
        cr.y = cr.fy = centerY + crateR * Math.sin(a);
      });
      rootNode.x = centerX; rootNode.y = centerY;
      rootNode.fx = centerX; rootNode.fy = centerY;
      prevNodeIds = activeIds;
      simulation.stop();
      simulation.nodes(nodes);
      simulation.force('link').links(links);
      simulation.tick();
      draw();
      updateStats();
      pushState();
    } else {
      // Explore: animated forces with smart initial positioning

      // Pre-position major concepts evenly around center
      const mcInView = nodes.filter(n => n.type === 'major_concept');
      if (mcInView.length > 0) {
        mcInView.forEach((mc, i) => {
          if (!prevNodeIds.has(mc.id)) {
            const a = (i / mcInView.length) * 2 * Math.PI - Math.PI / 2;
            mc.x = centerX + RING_RADII[0] * Math.cos(a);
            mc.y = centerY + RING_RADII[0] * Math.sin(a);
          }
        });
      }

      // Pre-position minor concepts with wide angular spread
      if (activeMajor) {
        const minorIds = majorToMinors.get(activeMajor.id) || new Set();
        const minorsInView = nodes.filter(n => minorIds.has(n.id));
        if (minorsInView.length > 0) {
          const pa = Math.atan2(
            (activeMajor.y || centerY) - centerY,
            (activeMajor.x || centerX) - centerX
          );
          const totalSpread = Math.PI * 1.5;
          minorsInView.forEach((mn, j) => {
            if (!prevNodeIds.has(mn.id)) {
              const a = pa - totalSpread / 2 + (j + 0.5) / minorsInView.length * totalSpread;
              mn.x = centerX + RING_RADII[1] * Math.cos(a);
              mn.y = centerY + RING_RADII[1] * Math.sin(a);
            }
          });
        }
      }

      // Pre-position contributors evenly when showing file's contributors
      if (activeFile) {
        const contribs = nodes.filter(n => n.type === 'contributor');
        contribs.forEach((c, i) => {
          if (!prevNodeIds.has(c.id)) {
            const a = (i / Math.max(contribs.length, 1)) * 2 * Math.PI - Math.PI / 2;
            c.x = centerX + RING_RADII[4] * Math.cos(a);
            c.y = centerY + RING_RADII[4] * Math.sin(a);
          }
        });
      }

      // Position remaining new nodes near the trigger
      const tx = triggerNode ? (triggerNode.x || centerX) : centerX;
      const ty = triggerNode ? (triggerNode.y || centerY) : centerY;
      for (const node of nodes) {
        if (node.x == null) {
          node.x = tx + (Math.random() - 0.5) * 30;
          node.y = ty + (Math.random() - 0.5) * 30;
        }
        if (node.id !== ROOT_ID) { node.fx = null; node.fy = null; }
      }
      prevNodeIds = activeIds;
      rootNode.x = centerX; rootNode.y = centerY;
      rootNode.fx = centerX; rootNode.fy = centerY;
      radialForce.x(centerX).y(centerY);
      simulation.nodes(nodes);
      simulation.force('link').links(links);
      simulation.alpha(0.35).restart();
      updateStats();
      pushState();
    }
  }

  // Force simulation with radial positioning
  function getTargetRadius(d) {
    if (d.type === 'root') return 0;
    if (d.type === 'major_concept') return RING_RADII[0];
    if (d.type === 'minor_concept') return RING_RADII[1];
    if (d.type === 'file') return (RING_RADII[2] + RING_RADII[3]) / 2;
    if (d.type === 'contributor') return RING_RADII[4];
    return 300;
  }
  const linkForce = d3.forceLink([]).id(d => d.id).distance(60).strength(0.15);
  const chargeForce = d3.forceManyBody().strength(-25).distanceMax(400);
  const radialForce = d3.forceRadial(d => getTargetRadius(d), centerX, centerY).strength(0.4);
  const collisionForce = d3.forceCollide(d => d.radius + 1).strength(0.6);
  const simulation = d3.forceSimulation([])
    .force('link', linkForce)
    .force('charge', chargeForce)
    .force('radial', radialForce)
    .force('collision', collisionForce)
    .alphaDecay(0.06)
    .velocityDecay(0.55)
    .on('tick', draw);

  // --- Navigation state (must be before appearance panel) ---
  let mode = 'explore'; // 'explore' or 'overview'
  let activeMajor = null; // major concept drilled into
  let activeMinor = null; // minor concept drilled into
  let activeFile = null; // file clicked to show its contributors
  let activeContributor = null; // contributor clicked to show their files

  // --- Appearance state ---
  let contributorScale = 1;
  let fileScale = 1;
  let crateScale = 1;
  let conceptScale = 1;
  let edgeWidth = 0.5;
  let edgeOpacity = 0.25;
  let highlightEdgeWidth = 1;
  let highlightEdgeOpacity = 0.35;
  let commitWidthScale = 0;
  let fixedSize = true;

  // --- Shared UI builders ---
  function makeGroup(title, parent) {
    const div = document.createElement('div');
    div.className = 'ctrl-group';
    div.innerHTML = `<div class="ctrl-group-title">${title}</div>`;
    parent.appendChild(div);
    return div;
  }

  function makeSlider(parent, label, min, max, step, value, onChange) {
    const row = document.createElement('div');
    row.className = 'ctrl-row';
    const valDisplay = document.createElement('span');
    valDisplay.className = 'ctrl-val';
    valDisplay.textContent = Number(value).toFixed(step < 0.01 ? 4 : step < 1 ? 2 : 0);
    const input = document.createElement('input');
    input.type = 'range';
    input.min = min;
    input.max = max;
    input.step = step;
    input.value = value;
    input.addEventListener('input', () => {
      const v = parseFloat(input.value);
      valDisplay.textContent = Number(v).toFixed(step < 0.01 ? 4 : step < 1 ? 2 : 0);
      onChange(v);
      simulation.alpha(Math.max(simulation.alpha(), 0.1)).restart();
    });
    const lbl = document.createElement('label');
    lbl.textContent = label;
    row.appendChild(lbl);
    row.appendChild(input);
    row.appendChild(valDisplay);
    parent.appendChild(row);
    return input;
  }

  function makeCheckbox(parent, label, checked, onChange) {
    const row = document.createElement('div');
    row.className = 'ctrl-check';
    const input = document.createElement('input');
    input.type = 'checkbox';
    input.checked = checked;
    input.id = 'chk-' + label.replace(/\s/g, '-');
    input.addEventListener('change', () => onChange(input.checked));
    const lbl = document.createElement('label');
    lbl.textContent = label;
    lbl.htmlFor = input.id;
    row.appendChild(input);
    row.appendChild(lbl);
    parent.appendChild(row);
    return input;
  }

  function makeTriSwitch(parent, label, initial, onChange) {
    const row = document.createElement('div');
    row.className = 'tri-switch';
    const btns = document.createElement('div');
    btns.className = 'tri-switch-btns';

    const states = [
      { value: 'visible', text: 'Show', cls: 'active-visible', title: 'Visible — rendered and in simulation' },
      { value: 'hidden',  text: 'Hide', cls: 'active-hidden',  title: 'Hidden — in simulation but not rendered' },
      { value: 'off',     text: 'Off',  cls: 'active-off',     title: 'Off — removed from simulation entirely' },
    ];

    const buttons = [];
    for (const s of states) {
      const btn = document.createElement('button');
      btn.className = 'tri-switch-btn' + (s.value === initial ? ' ' + s.cls : '');
      btn.textContent = s.text;
      btn.title = s.title;
      btn.dataset.value = s.value;
      btn.dataset.cls = s.cls;
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.className = 'tri-switch-btn');
        btn.className = 'tri-switch-btn ' + s.cls;
        onChange(s.value);
      });
      buttons.push(btn);
      btns.appendChild(btn);
    }

    const lbl = document.createElement('span');
    lbl.className = 'tri-switch-label';
    lbl.textContent = label;

    row.appendChild(btns);
    row.appendChild(lbl);
    parent.appendChild(row);
  }

  // --- Appearance panel ---
  const appearBody = document.getElementById('appear-body');

  // Mode switch (Explore / Overview)
  const modeGroup = makeGroup('Mode', appearBody);
  const modeRow = document.createElement('div');
  modeRow.className = 'mode-switch';
  const modeBtns = document.createElement('div');
  modeBtns.className = 'mode-switch-btns';
  const exploreBtn = document.createElement('button');
  exploreBtn.className = 'mode-switch-btn active';
  exploreBtn.textContent = 'Explore';
  const overviewBtn = document.createElement('button');
  overviewBtn.className = 'mode-switch-btn';
  overviewBtn.textContent = 'Overview';
  function setMode(m) {
    mode = m;
    exploreBtn.className = 'mode-switch-btn' + (m === 'explore' ? ' active' : '');
    overviewBtn.className = 'mode-switch-btn' + (m === 'overview' ? ' active' : '');
    activeMajor = null; activeMinor = null; activeFile = null; activeContributor = null;
    rebuildGraph(rootNode);
  }
  exploreBtn.addEventListener('click', () => setMode('explore'));
  overviewBtn.addEventListener('click', () => setMode('overview'));
  modeBtns.appendChild(exploreBtn);
  modeBtns.appendChild(overviewBtn);
  modeRow.appendChild(modeBtns);
  modeGroup.appendChild(modeRow);

  // Visibility group — tri-switches
  const visGroup = makeGroup('Visibility', appearBody);

  function onVisChange(key, needsRebuild) {
    return (value) => {
      const wasOff = vis[key] === 'off';
      vis[key] = value;
      const isOff = value === 'off';
      if (wasOff !== isOff) {
        rebuildGraph();
      } else {
        draw();
        pushState();
      }
    };
  }

  makeTriSwitch(visGroup, 'Contributors',        'visible', onVisChange('contributors'));
  makeTriSwitch(visGroup, 'Active Source Code',  'visible', onVisChange('activeSource'));
  makeTriSwitch(visGroup, 'All Other Files',     'off',     onVisChange('otherFiles'));
  makeTriSwitch(visGroup, 'Crates',              'visible', onVisChange('crates'));
  makeTriSwitch(visGroup, 'Major Concepts',      'visible', onVisChange('majorConcepts'));
  makeTriSwitch(visGroup, 'Minor Concepts',      'visible', onVisChange('minorConcepts'));
  makeTriSwitch(visGroup, 'Authored edges',       'visible', onVisChange('authored'));
  makeTriSwitch(visGroup, 'Dependency edges',    'visible', onVisChange('dependsOn'));
  makeTriSwitch(visGroup, 'Contains edges',      'visible', onVisChange('contains'));
  makeTriSwitch(visGroup, 'Contributed-to edges', 'visible', onVisChange('contributedTo'));
  makeTriSwitch(visGroup, 'Has-minor edges',     'visible', onVisChange('hasMinor'));
  makeTriSwitch(visGroup, 'Tagged-with edges',   'visible', onVisChange('taggedWith'));

  // Node sizing group
  const nodeGroup = makeGroup('Nodes', appearBody);
  makeSlider(nodeGroup, 'Contributor Size', 0.1, 5, 0.1, 1, v => { contributorScale = v; draw(); });
  makeSlider(nodeGroup, 'File Size', 0.1, 5, 0.1, 1, v => { fileScale = v; draw(); });
  makeSlider(nodeGroup, 'Crate Size', 0.1, 5, 0.1, 1, v => { crateScale = v; draw(); });
  makeSlider(nodeGroup, 'Concept Size', 0.1, 5, 0.1, 1, v => { conceptScale = v; draw(); });
  makeCheckbox(nodeGroup, 'Fixed size (ignore zoom)', true, v => { fixedSize = v; draw(); });

  const edgeGroup = makeGroup('Edges', appearBody);
  makeSlider(edgeGroup, 'Width', 0.1, 5, 0.1, 0.5, v => { edgeWidth = v; draw(); });
  makeSlider(edgeGroup, 'Opacity', 0, 1, 0.005, 0.25, v => { edgeOpacity = v; draw(); });
  makeSlider(edgeGroup, 'Commit Width', 0, 3, 0.05, 0, v => { commitWidthScale = v; draw(); });
  makeSlider(edgeGroup, 'Highlight Width', 0.1, 5, 0.1, 1, v => { highlightEdgeWidth = v; draw(); });
  makeSlider(edgeGroup, 'Highlight Opacity', 0, 1, 0.01, 0.35, v => { highlightEdgeOpacity = v; draw(); });

  // --- Force controls panel ---
  const ctrlBody = document.getElementById('ctrl-body');

  const forceGroup = makeGroup('Forces', ctrlBody);
  makeSlider(forceGroup, 'Charge', -100, 0, 1, -25, v => { chargeForce.strength(v); });
  makeSlider(forceGroup, 'Radial Pull', 0, 1, 0.01, 0.4, v => { radialForce.strength(v); });
  makeSlider(forceGroup, 'Link Distance', 10, 300, 5, 60, v => { linkForce.distance(v); });
  makeSlider(forceGroup, 'Link Strength', 0, 1, 0.01, 0.15, v => { linkForce.strength(v); });
  makeSlider(forceGroup, 'Collision', 0, 2, 0.05, 0.6, v => { collisionForce.strength(v); });

  const layoutGroup = makeGroup('Ring Radii', ctrlBody);
  makeSlider(layoutGroup, 'Concepts', 50, 500, 10, 200, v => { RING_RADII[0] = v; simulation.alpha(0.3).restart(); });
  makeSlider(layoutGroup, 'Subconcepts', 100, 800, 10, 400, v => { RING_RADII[1] = v; simulation.alpha(0.3).restart(); });
  makeSlider(layoutGroup, 'Files', 200, 1200, 10, 675, v => { RING_RADII[2] = v; RING_RADII[3] = v; simulation.alpha(0.3).restart(); });
  makeSlider(layoutGroup, 'Contributors', 400, 2000, 10, 1000, v => { RING_RADII[4] = v; simulation.alpha(0.3).restart(); });

  const btnRow = document.createElement('div');
  btnRow.style.marginTop = '8px';
  const reheatBtn = document.createElement('button');
  reheatBtn.className = 'ctrl-btn';
  reheatBtn.textContent = 'Reheat';
  reheatBtn.onclick = () => { simulation.alpha(1).restart(); };
  const stopBtn = document.createElement('button');
  stopBtn.className = 'ctrl-btn';
  stopBtn.textContent = 'Stop';
  stopBtn.onclick = () => { simulation.stop(); };
  btnRow.appendChild(reheatBtn);
  btnRow.appendChild(stopBtn);
  ctrlBody.appendChild(btnRow);

  // Zoom
  let transform = d3.zoomIdentity;
  const zoom = d3.zoom()
    .scaleExtent([0.05, 20])
    .filter((event) => {
      // Allow wheel/pinch zoom everywhere, but suppress pan (mousedown)
      // when the pointer is over a node so d3-drag can handle it instead.
      if (event.type === 'mousedown') {
        const rect = canvas.getBoundingClientRect();
        const mx = event.clientX - rect.left;
        const my = event.clientY - rect.top;
        if (nodeAt(mx, my)) return false;
      }
      return !event.button; // default d3 filter: ignore right-click
    })
    .on('zoom', (event) => {
      transform = event.transform;
      draw();
      pushState();
    });
  d3.select(canvas).call(zoom);

  // State
  let hoveredNode = null;
  let draggedNode = null;
  const selectedNodes = new Set();
  // Pre-compute lookup: major concept id → set of minor concept ids
  const majorToMinors = new Map();
  for (const link of allLinksRaw) {
    if (link.type === 'has_minor') {
      if (!majorToMinors.has(link.source)) majorToMinors.set(link.source, new Set());
      majorToMinors.get(link.source).add(link.target);
    }
  }
  // Pre-compute lookup: concept id → set of tagged file ids
  const conceptToFiles = new Map();
  for (const link of allLinksRaw) {
    if (link.type === 'tagged_with') {
      if (!conceptToFiles.has(link.source)) conceptToFiles.set(link.source, new Set());
      conceptToFiles.get(link.source).add(link.target);
    }
  }
  // Pre-compute: contributor id → set of authored file ids
  const contributorToFiles = new Map();
  for (const link of allLinksRaw) {
    if (link.type === 'authored') {
      if (!contributorToFiles.has(link.source)) contributorToFiles.set(link.source, new Set());
      contributorToFiles.get(link.source).add(link.target);
    }
  }

  // Pre-compute: file id → set of contributor ids (inverse of contributorToFiles)
  const fileToContributors = new Map();
  for (const link of allLinksRaw) {
    if (link.type === 'authored') {
      if (!fileToContributors.has(link.target)) fileToContributors.set(link.target, new Set());
      fileToContributors.get(link.target).add(link.source);
    }
  }

  // Assign each file to exactly one major concept sector (for radial layout)
  // Uses the major concept with the most tagged_with connections (direct + via minors)
  const fileToMajor = new Map();
  const majorConceptNodes = allNodes.filter(n => n.type === 'major_concept');
  const fileMajorScores = new Map(); // file_id → Map<major_id, count>
  for (const mc of majorConceptNodes) {
    const minorIds = majorToMinors.get(mc.id) || new Set();
    const allConceptIds = [mc.id, ...minorIds];
    for (const cid of allConceptIds) {
      const files = conceptToFiles.get(cid) || new Set();
      for (const fid of files) {
        if (!fileMajorScores.has(fid)) fileMajorScores.set(fid, new Map());
        const scores = fileMajorScores.get(fid);
        scores.set(mc.id, (scores.get(mc.id) || 0) + 1);
      }
    }
  }
  fileToMajor.clear();
  for (const [fid, scores] of fileMajorScores) {
    let best = null, bestCount = 0;
    for (const [mid, count] of scores) {
      if (count > bestCount) { best = mid; bestCount = count; }
    }
    if (best) fileToMajor.set(fid, best);
  }

  // Group minor concepts by major concept
  const majorToMinorNodes = new Map();
  for (const mc of majorConceptNodes) {
    const minorIds = majorToMinors.get(mc.id) || new Set();
    const minorNodes = allNodes.filter(n => minorIds.has(n.id));
    majorToMinorNodes.set(mc.id, minorNodes);
  }

  // Group files by major concept
  const majorToFileNodes = new Map();
  for (const mc of majorConceptNodes) {
    majorToFileNodes.set(mc.id, []);
  }
  for (const [fid, mid] of fileToMajor) {
    const fnode = nodeMap.get(fid);
    if (fnode && majorToFileNodes.has(mid)) {
      majorToFileNodes.get(mid).push(fnode);
    }
  }
  // Sort files in each sector: largest first
  for (const [mid, files] of majorToFileNodes) {
    files.sort((a, b) => b.radius - a.radius);
  }

  // Fix root node at center
  rootNode.fx = centerX;
  rootNode.fy = centerY;
  selectedNodes.add(ROOT_ID);

  // --- Push visualization state to backend ---
  let _pushTimer = null;
  function pushState() {
    if (_pushTimer) clearTimeout(_pushTimer);
    _pushTimer = setTimeout(() => { _pushTimer = null; _doPushState(); }, 300);
  }

  function _nodeRef(node) {
    return node ? { id: node.id, name: node.name, type: node.type } : null;
  }

  function _computeNodesInView() {
    const topLeft = transform.invert([0, 0]);
    const bottomRight = transform.invert([width, height]);
    const x0 = topLeft[0], y0 = topLeft[1];
    const x1 = bottomRight[0], y1 = bottomRight[1];

    const result = [];
    for (const node of nodes) {
      if (!nodeDrawn(node)) continue;
      if (node.x >= x0 && node.x <= x1 && node.y >= y0 && node.y <= y1) {
        result.push({ id: node.id, name: node.name, type: node.type });
      }
    }
    return result;
  }

  function _doPushState() {
    const byType = {};
    for (const node of nodes) {
      byType[node.type] = (byType[node.type] || 0) + 1;
    }

    const state = {
      timestamp: new Date().toISOString(),
      mode: mode,
      selection: {
        activeMajor: _nodeRef(activeMajor),
        activeMinor: _nodeRef(activeMinor),
        activeFile: _nodeRef(activeFile),
        activeContributor: _nodeRef(activeContributor),
      },
      viewport: {
        x: transform.x,
        y: transform.y,
        k: transform.k,
        canvasWidth: width,
        canvasHeight: height,
      },
      visibility: { ...vis },
      timeline: {
        start: tlStart,
        end: tlEnd,
        startDate: fmtDate(tlStart),
        endDate: fmtDate(tlEnd),
      },
      nodesInView: _computeNodesInView(),
      nodesInSimulation: {
        total: nodes.length,
        byType: byType,
      },
    };

    fetch('/state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state),
    }).catch(() => {}); // fire-and-forget
  }

  // --- Initial graph build ---
  rebuildGraph();

  // Draw
  function draw() {
    ctx.save();
    ctx.clearRect(0, 0, width, height);
    ctx.translate(transform.x, transform.y);
    ctx.scale(transform.k, transform.k);

    const highlightSet = new Set();
    if (hoveredNode && nodeDrawn(hoveredNode)) {
      highlightSet.add(hoveredNode.id);
      const neighbors = adjacency.get(hoveredNode.id);
      if (neighbors) neighbors.forEach(n => highlightSet.add(n));
    }

    // Size compensation for fixed-size mode
    const zk = fixedSize ? (1 / transform.k) : 1;

    // Center cross marker
    const crossSize = 10 * zk;
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
    ctx.lineWidth = 1 * zk;
    ctx.beginPath();
    ctx.moveTo(centerX - crossSize, centerY);
    ctx.lineTo(centerX + crossSize, centerY);
    ctx.moveTo(centerX, centerY - crossSize);
    ctx.lineTo(centerX, centerY + crossSize);
    ctx.stroke();

    // Edges
    for (const link of links) {
      if (!linkDrawn(link)) continue;

      const s = link.source;
      const t = link.target;
      const rgb = EDGE_RGB[link.type] || EDGE_RGB.authored;
      const opScale = EDGE_OPACITY_SCALE[link.type] || 1;

      let hl = hoveredNode && highlightSet.has(s.id) && highlightSet.has(t.id);
      const alpha = hl
        ? Math.min(highlightEdgeOpacity * opScale, 1)
        : Math.min(edgeOpacity * opScale, 1);
      let commitExtra = 0;
      if (commitWidthScale > 0 && (link.type === 'authored' || link.type === 'contributed_to')) {
        const count = link.type === 'authored' ? link.commits : (link.totalCommits || 0);
        commitExtra = commitWidthScale * Math.sqrt(count);
      }
      const lw = hl ? (highlightEdgeWidth + commitExtra) * zk : (edgeWidth + commitExtra) * zk;

      ctx.strokeStyle = `rgba(${rgb}, ${alpha})`;
      ctx.lineWidth = lw;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(t.x, t.y);
      ctx.stroke();

      // Arrowhead for directed edges (depends_on)
      if (link.type === 'depends_on') {
        const dx = t.x - s.x;
        const dy = t.y - s.y;
        const len = Math.sqrt(dx * dx + dy * dy);
        if (len < 1e-6) continue;
        const ux = dx / len;
        const uy = dy / len;
        const tScale = getNodeScale(t);
        const tr = t.radius * tScale * zk;
        const tipX = t.x - ux * tr;
        const tipY = t.y - uy * tr;
        const arrowLen = Math.max(6 * zk, lw * 4);
        const arrowW = arrowLen * 0.5;
        const baseX = tipX - ux * arrowLen;
        const baseY = tipY - uy * arrowLen;
        ctx.fillStyle = `rgba(${rgb}, ${alpha})`;
        ctx.beginPath();
        ctx.moveTo(tipX, tipY);
        ctx.lineTo(baseX - uy * arrowW, baseY + ux * arrowW);
        ctx.lineTo(baseX + uy * arrowW, baseY - ux * arrowW);
        ctx.closePath();
        ctx.fill();
      }
    }

    // Nodes
    const dimAlpha = hoveredNode ? 0.15 : 1;
    for (const node of nodes) {
      if (!nodeDrawn(node)) continue;

      const highlighted = highlightSet.has(node.id);
      let alpha = hoveredNode ? (highlighted ? 1 : dimAlpha) : 1;

      // No extra dimming — filtering handles what's visible

      const scale = getNodeScale(node);
      const r = node.radius * scale * zk;

      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(node.x, node.y, r, 0, 2 * Math.PI);

      if (node.type === 'root') {
        ctx.fillStyle = ROOT_COLOR;
      } else if (node.type === 'contributor') {
        ctx.fillStyle = CONTRIBUTOR_COLOR;
      } else if (node.type === 'crate') {
        ctx.fillStyle = CRATE_COLOR;
      } else if (node.type === 'major_concept') {
        ctx.fillStyle = MAJOR_CONCEPT_COLOR;
      } else if (node.type === 'minor_concept') {
        ctx.fillStyle = MINOR_CONCEPT_COLOR;
      } else if (node.deleted) {
        ctx.fillStyle = DELETED_FILE_COLOR;
      } else {
        ctx.fillStyle = FILE_COLOR;
      }
      ctx.fill();

      // Active file ring
      if (activeFile && node.id === activeFile.id) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = Math.max(2 * zk, 1);
        ctx.beginPath();
        ctx.arc(node.x, node.y, r + 3 * zk, 0, 2 * Math.PI);
        ctx.stroke();
      }

      // Active contributor ring
      if (activeContributor && node.id === activeContributor.id) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = Math.max(2 * zk, 1);
        ctx.beginPath();
        ctx.arc(node.x, node.y, r + 3 * zk, 0, 2 * Math.PI);
        ctx.stroke();
      }

      // Selection ring
      if (selectedNodes.has(node.id)) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = Math.max(1.5 * zk, 1);
        ctx.beginPath();
        ctx.arc(node.x, node.y, r + 2 * zk, 0, 2 * Math.PI);
        ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;

    // Label font size: constant screen size when fixedSize, else world-space
    const fontSize = fixedSize ? 12 * zk : Math.max(4, 12);
    const labelPad = fixedSize ? 4 * zk : 4;

    // Always-visible labels for concepts, root, and contributors when file is selected
    for (const node of nodes) {
      if (!nodeDrawn(node)) continue;
      const showLabel = node.type === 'root' || node.type === 'major_concept' || node.type === 'minor_concept'
        || (node.type === 'contributor' && activeFile);
      if (!showLabel) continue;
      if (hoveredNode && node.id === hoveredNode.id) continue; // drawn below with hover styling

      const highlighted = hoveredNode ? highlightSet.has(node.id) : true;
      const scale = getNodeScale(node);
      const r = node.radius * scale * zk;
      ctx.globalAlpha = hoveredNode ? (highlighted ? 1 : dimAlpha) : 0.9;
      ctx.font = `bold ${fontSize}px -apple-system, sans-serif`;
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(node.name, node.x + r + labelPad, node.y);
    }
    ctx.globalAlpha = 1;

    // Label for hovered node
    if (hoveredNode && nodeDrawn(hoveredNode)) {
      const hScale = getNodeScale(hoveredNode);
      const hR = hoveredNode.radius * hScale * zk;
      ctx.font = `bold ${fontSize}px -apple-system, sans-serif`;
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'bottom';
      ctx.fillText(hoveredNode.name, hoveredNode.x + hR + labelPad, hoveredNode.y - labelPad);
    }

    ctx.restore();
  }

  // Hit detection
  function nodeAt(mx, my) {
    const sx = (mx - transform.x) / transform.k;
    const sy = (my - transform.y) / transform.k;
    const zk = fixedSize ? (1 / transform.k) : 1;
    let closest = null;
    let closestDist = Infinity;
    for (let i = nodes.length - 1; i >= 0; i--) {
      const n = nodes[i];
      if (!nodeDrawn(n)) continue;
      const scale = getNodeScale(n);
      const dx = sx - n.x;
      const dy = sy - n.y;
      const dist = dx * dx + dy * dy;
      const hitRadius = Math.max(n.radius * scale * zk, 5 / transform.k);
      if (dist < hitRadius * hitRadius && dist < closestDist) {
        closest = n;
        closestDist = dist;
      }
    }
    return closest;
  }

  // Mouse events
  canvas.addEventListener('mousemove', (e) => {
    if (draggedNode) return;
    const node = nodeAt(e.clientX, e.clientY);
    if (node !== hoveredNode) {
      hoveredNode = node;
      canvas.style.cursor = node ? 'pointer' : 'default';
      if (node) {
        tooltip.style.display = 'block';
        let html = `<div class="value">${node.name}</div>`;
        if (node.type === 'root') {
          html += `<div class="label">Root node</div>`;
          if (activeMajor || activeMinor || activeContributor) {
            html += `<div class="label" style="color:#93c5fd">Click to go back</div>`;
          }
        } else if (node.type === 'contributor') {
          html += `<div class="label">Contributor | ${node.totalCommits} commits</div>`;
          if (node.createdAt) html += `<div class="label">First commit: ${fmtDate(node.createdAt)}</div>`;
          if (node.role) html += `<div class="label" style="color:#d4d4d4">Role: ${node.role}</div>`;
          if (node.contributions) {
            const text = node.contributions.length > 180 ? node.contributions.slice(0, 180) + '\u2026' : node.contributions;
            html += `<div class="label" style="white-space:normal;max-width:340px;max-height:60px;overflow:hidden;line-height:1.3">${text}</div>`;
          }
          const files = contributorToFiles.get(node.id);
          if (files) html += `<div class="label">${files.size} files authored</div>`;
          if (mode === 'explore') {
            const isActive = activeContributor && activeContributor.id === node.id;
            html += `<div class="label" style="color:#93c5fd">${isActive ? 'Click to deselect' : 'Click to show authored files'}</div>`;
          }
        } else if (node.type === 'crate') {
          const targets = [];
          if (node.hasLib) targets.push('lib');
          if (node.hasBin) targets.push('bin');
          html += `<div class="label">Crate | edition ${node.edition} | ${targets.join(', ') || 'no targets'}</div>`;
          html += `<div class="label">${node.rootDir}</div>`;
          if (node.createdAt) html += `<div class="label">Created ${new Date(node.createdAt).toLocaleDateString()}</div>`;
        } else if (node.type === 'major_concept') {
          html += `<div class="label">Major Concept</div>`;
          html += `<div class="label" style="white-space:normal;max-width:350px">${node.definition}</div>`;
          const directFiles = conceptToFiles.get(node.id) || new Set();
          const minorCount = (majorToMinors.get(node.id) || new Set()).size;
          html += `<div class="label">${minorCount} subconcepts · ${directFiles.size} direct files</div>`;
          if (mode === 'explore') html += `<div class="label" style="color:#93c5fd">Click to explore</div>`;
        } else if (node.type === 'minor_concept') {
          html += `<div class="label">Minor Concept</div>`;
          html += `<div class="label" style="white-space:normal;max-width:350px">${node.definition}</div>`;
          const taggedFiles = conceptToFiles.get(node.id) || new Set();
          html += `<div class="label">${taggedFiles.size} files</div>`;
          if (mode === 'explore') html += `<div class="label" style="color:#93c5fd">Click to show files</div>`;
        } else {
          const locStr = node.lineCount > 0 ? ` | ${node.lineCount.toLocaleString()} lines` : '';
          html += `<div class="label">File${node.deleted ? ' (deleted)' : ''} | ${node.fileType || 'unknown'}${locStr}</div>`;
          if (node.summary) html += `<div class="label" style="white-space:normal;max-width:350px">${node.summary}</div>`;
          if (mode === 'explore') {
            const nContribs = (fileToContributors.get(node.id) || new Set()).size;
            if (nContribs > 0) {
              const isActive = activeFile && activeFile.id === node.id;
              html += `<div class="label" style="color:#93c5fd">${isActive ? 'Click to deselect' : 'Click to show ' + nContribs + ' contributors'}</div>`;
            }
          }
        }
        const neighbors = adjacency.get(node.id);
        if (neighbors) html += `<div class="label">${neighbors.size} connections</div>`;
        tooltip.innerHTML = html;
      } else {
        tooltip.style.display = 'none';
      }
      draw();
    }
    if (hoveredNode) {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY + 24) + 'px';
    }
  });

  canvas.addEventListener('mouseleave', () => {
    hoveredNode = null;
    tooltip.style.display = 'none';
    draw();
  });

  // Drag (with click-to-select)
  let dragStartX = 0, dragStartY = 0;
  const CLICK_THRESHOLD = 4; // px — below this, treat as click not drag

  d3.select(canvas).call(
    d3.drag()
      .container(canvas)
      .subject((event) => {
        const node = nodeAt(event.x, event.y);
        if (node) {
          node.x = transform.applyX(node.x);
          node.y = transform.applyY(node.y);
        }
        return node;
      })
      .on('start', (event) => {
        if (event.subject.id === ROOT_ID) {
          // Root is immovable but track click start for navigation
          dragStartX = event.x;
          dragStartY = event.y;
          draggedNode = event.subject;
          return;
        }
        if (!event.active) simulation.alphaTarget(0.1).restart();
        draggedNode = event.subject;
        dragStartX = event.x;
        dragStartY = event.y;
        event.subject.fx = transform.invertX(event.x);
        event.subject.fy = transform.invertY(event.y);
        tooltip.style.display = 'none';
      })
      .on('drag', (event) => {
        if (event.subject.id === ROOT_ID) return;
        event.subject.fx = transform.invertX(event.x);
        event.subject.fy = transform.invertY(event.y);
      })
      .on('end', (event) => {
        const dx = event.x - dragStartX;
        const dy = event.y - dragStartY;
        const wasDragged = Math.sqrt(dx * dx + dy * dy) >= CLICK_THRESHOLD;

        if (event.subject.id === ROOT_ID) {
          if (!wasDragged && mode === 'explore') {
            if (activeContributor) { activeContributor = null; }
            else if (activeFile) { activeFile = null; }
            else if (activeMinor) { activeMinor = null; }
            else if (activeMajor) { activeMajor = null; }
            rebuildGraph(rootNode);
          }
          draggedNode = null;
          return;
        }
        if (!event.active) simulation.alphaTarget(0);
        const node = event.subject;

        if (!wasDragged && mode === 'explore') {
          if (node.type === 'major_concept') {
            activeContributor = null; activeFile = null; activeMinor = null;
            activeMajor = (activeMajor && activeMajor.id === node.id) ? null : node;
            rebuildGraph(node);
          } else if (node.type === 'minor_concept') {
            activeFile = null;
            activeMinor = (activeMinor && activeMinor.id === node.id) ? null : node;
            rebuildGraph(node);
          } else if (node.type === 'file') {
            activeContributor = null;
            activeFile = (activeFile && activeFile.id === node.id) ? null : node;
            rebuildGraph(node);
          } else if (node.type === 'contributor') {
            activeMajor = null; activeMinor = null; activeFile = null;
            activeContributor = (activeContributor && activeContributor.id === node.id) ? null : node;
            rebuildGraph(node);
          }
        }
        draggedNode = null;
        draw();
      })
  );

  // Escape to go back / deselect
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (mode === 'overview') return;
      if (activeContributor) { activeContributor = null; }
      else if (activeFile) { activeFile = null; }
      else if (activeMinor) { activeMinor = null; }
      else if (activeMajor) { activeMajor = null; }
      rebuildGraph(rootNode);
    }
  });

})();
</script>
</body>
</html>
