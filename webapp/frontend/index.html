<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Graph Visualization</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  canvas { display: block; }
  #tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(20, 20, 20, 0.95);
    color: #e0e0e0;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.4;
    border: 1px solid rgba(255, 255, 255, 0.15);
    display: none;
    max-width: 400px;
    white-space: nowrap;
  }
  #tooltip .label { color: #888; font-size: 11px; }
  #tooltip .value { color: #fff; font-weight: 500; }
  #legend {
    position: absolute;
    bottom: 64px;
    right: 16px;
    background: rgba(20, 20, 20, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 14px 18px;
    color: #ccc;
    font-size: 13px;
  }
  #legend h3 { margin-bottom: 10px; color: #fff; font-size: 14px; }
  .legend-section { margin-bottom: 8px; }
  .legend-section:last-child { margin-bottom: 0; }
  .legend-section-title { color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  .legend-line { width: 16px; height: 3px; border-radius: 1px; }
  #stats {
    position: absolute;
    bottom: 64px;
    left: 16px;
    background: rgba(20, 20, 20, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 10px 14px;
    color: #888;
    font-size: 12px;
  }
  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #888;
    font-size: 16px;
  }
  #controls {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(20, 20, 20, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 14px 18px;
    color: #ccc;
    font-size: 12px;
    width: 320px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #444 transparent;
  }
  #controls::-webkit-scrollbar { width: 5px; }
  #controls::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  #controls h3 {
    color: #fff;
    font-size: 13px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  #controls h3 .toggle { font-size: 10px; color: #888; }
  .ctrl-group {
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding-bottom: 10px;
  }
  .ctrl-group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .ctrl-group-title {
    color: #aaa;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .ctrl-row {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    gap: 8px;
  }
  .ctrl-row label {
    flex: 0 0 100px;
    color: #999;
    font-size: 11px;
  }
  .ctrl-row input[type="range"] {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: #333;
    border-radius: 2px;
    outline: none;
  }
  .ctrl-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #888;
    cursor: pointer;
  }
  .ctrl-row input[type="range"]::-webkit-slider-thumb:hover { background: #aaa; }
  .ctrl-row .ctrl-val {
    flex: 0 0 48px;
    text-align: right;
    color: #ccc;
    font-size: 11px;
    font-family: monospace;
  }
  #controls .ctrl-body { display: block; }
  #controls .ctrl-body.collapsed { display: none; }
  .ctrl-btn {
    background: #333;
    color: #ccc;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    margin-right: 6px;
    margin-top: 4px;
  }
  .ctrl-btn:hover { background: #444; color: #fff; }
  #appearance {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(20, 20, 20, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 14px 18px;
    color: #ccc;
    font-size: 12px;
    width: 320px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #444 transparent;
  }
  #appearance::-webkit-scrollbar { width: 5px; }
  #appearance::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  #appearance h3 {
    color: #fff;
    font-size: 13px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  #appearance h3 .toggle { font-size: 10px; color: #888; }
  #appearance .ctrl-body { display: block; }
  #appearance .ctrl-body.collapsed { display: none; }
  .ctrl-check {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    gap: 8px;
  }
  .ctrl-check label {
    color: #999;
    font-size: 11px;
    cursor: pointer;
  }
  .ctrl-check input[type="checkbox"] {
    accent-color: #888;
    cursor: pointer;
  }
  .tri-switch {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    gap: 8px;
  }
  .tri-switch-btns {
    display: flex;
    flex-shrink: 0;
    border: 1px solid #444;
    border-radius: 4px;
    overflow: hidden;
  }
  .tri-switch-btn {
    background: transparent;
    color: #555;
    border: none;
    border-right: 1px solid #444;
    padding: 2px 7px;
    font-size: 11px;
    cursor: pointer;
    line-height: 1.4;
  }
  .tri-switch-btn:last-child { border-right: none; }
  .tri-switch-btn:hover { color: #999; }
  .tri-switch-btn.active-visible { background: #1a3a2a; color: #10b981; }
  .tri-switch-btn.active-hidden { background: #2a2a1a; color: #eab308; }
  .tri-switch-btn.active-off { background: #2a1a1a; color: #ef4444; }
  .tri-switch-label {
    color: #999;
    font-size: 11px;
  }
  /* Timeline */
  #timeline {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    background: rgba(15, 15, 15, 0.95);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    user-select: none;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
    z-index: 10;
  }
  #timeline-label-start, #timeline-label-end {
    color: #aaa;
    font-size: 11px;
    font-family: monospace;
    min-width: 80px;
    white-space: nowrap;
  }
  #timeline-label-end { text-align: right; }
  #timeline-track {
    position: relative;
    flex: 1;
    height: 28px;
    background: #111;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
  }
  #timeline-hist {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-end;
    gap: 0;
    opacity: 0.3;
  }
  #timeline-hist .hist-bar {
    flex: 1;
    background: #555;
    min-width: 0;
  }
  #timeline-fill {
    position: absolute;
    top: 0;
    height: 100%;
    background: rgba(59, 130, 246, 0.25);
    pointer-events: none;
  }
  .timeline-handle {
    position: absolute;
    top: 0;
    width: 10px;
    height: 100%;
    background: rgba(140, 140, 140, 0.8);
    border-radius: 3px;
    cursor: ew-resize;
    z-index: 2;
    transition: background 0.1s;
  }
  .timeline-handle:hover, .timeline-handle.active { background: rgba(200, 200, 200, 0.9); }
  /* Mode switch */
  .mode-switch {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    gap: 8px;
  }
  .mode-switch-btns {
    display: flex;
    flex-shrink: 0;
    border: 1px solid #444;
    border-radius: 4px;
    overflow: hidden;
  }
  .mode-switch-btn {
    background: transparent;
    color: #666;
    border: none;
    border-right: 1px solid #444;
    padding: 3px 12px;
    font-size: 11px;
    cursor: pointer;
    line-height: 1.4;
  }
  .mode-switch-btn:last-child { border-right: none; }
  .mode-switch-btn:hover:not(:disabled) { color: #999; }
  .mode-switch-btn.active { background: #1a2a3a; color: #3b82f6; }
  .mode-switch-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .ctrl-row.disabled label,
  .ctrl-row.disabled .ctrl-val { opacity: 0.3; }
  .ctrl-row.disabled input[type="range"] { opacity: 0.3; pointer-events: none; }
  .depth-slider-wrap { flex: 1; display: flex; flex-direction: column; gap: 0; }
  .depth-slider-wrap input[type="range"] { width: 100%; margin: 0; }
  .depth-ticks {
    display: flex;
    justify-content: space-between;
    padding: 0 2px;
  }
  .depth-ticks span {
    font-size: 9px;
    color: #666;
    font-family: monospace;
    width: 12px;
    text-align: center;
  }
  .ctrl-row.disabled .depth-ticks span { opacity: 0.3; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="tooltip"></div>
<div id="appearance">
  <h3 onclick="document.getElementById('appear-body').classList.toggle('collapsed')">
    Appearance <span class="toggle">&#9660;</span>
  </h3>
  <div class="ctrl-body" id="appear-body"></div>
</div>
<div id="legend">
  <h3>Knowledge Graph</h3>
  <div class="legend-section">
    <div class="legend-section-title">Nodes</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffffff"></div> Codex (root)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> Contributors</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> Files (active)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#6b7280"></div> Files (deleted)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div> Crates</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ec4899"></div> Major Concepts</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f472b6"></div> Minor Concepts</div>
  </div>
  <div class="legend-section">
    <div class="legend-section-title">Edges</div>
    <div class="legend-item"><div class="legend-line" style="background:rgba(255,255,255,0.6)"></div> Authored</div>
    <div class="legend-item"><div class="legend-line" style="background:#ef4444"></div> Depends on (directed)</div>
    <div class="legend-item"><div class="legend-line" style="background:#10b981"></div> Contains</div>
    <div class="legend-item"><div class="legend-line" style="background:#a855f7"></div> Contributed to</div>
    <div class="legend-item"><div class="legend-line" style="background:#ec4899"></div> Has minor</div>
    <div class="legend-item"><div class="legend-line" style="background:#06b6d4"></div> Tagged with</div>
  </div>
</div>
<div id="controls">
  <h3 onclick="document.getElementById('ctrl-body').classList.toggle('collapsed')">
    Force Simulation <span class="toggle">&#9660;</span>
  </h3>
  <div class="ctrl-body" id="ctrl-body"></div>
</div>
<div id="stats" style="display:none"></div>
<div id="timeline">
  <span id="timeline-label-start"></span>
  <div id="timeline-track">
    <div id="timeline-hist"></div>
    <div id="timeline-fill"></div>
    <div class="timeline-handle" id="handle-start"></div>
    <div class="timeline-handle" id="handle-end"></div>
  </div>
  <span id="timeline-label-end"></span>
</div>
<div id="loading">Loading knowledge graph...</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(async function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const tooltip = document.getElementById('tooltip');
  const statsEl = document.getElementById('stats');
  const loadingEl = document.getElementById('loading');

  // High-DPI support
  let width, height, dpr;
  function resize() {
    dpr = window.devicePixelRatio || 1;
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', () => {
    resize();
    centerX = width / 2;
    centerY = height / 2;
    draw();
  });

  // Colors
  const CONTRIBUTOR_COLOR = '#f59e0b';
  const FILE_COLOR = '#3b82f6';
  const DELETED_FILE_COLOR = '#6b7280';
  const CRATE_COLOR = '#10b981';
  const MAJOR_CONCEPT_COLOR = '#ec4899';
  const MINOR_CONCEPT_COLOR = '#f472b6';
  const ROOT_COLOR = '#ffffff';

  // Edge colors as RGB components (alpha applied dynamically)
  const EDGE_RGB = {
    authored: '255, 255, 255',
    depends_on: '239, 68, 68',
    contains: '16, 185, 129',
    contributed_to: '168, 85, 247',
    has_minor: '236, 72, 153',
    has_major: '255, 255, 255',
    tagged_with: '6, 182, 212',
  };

  // Perceived-luminance correction so all edge colors look equally bright.
  // Uses rec. 709 coefficients: L = 0.2126*R + 0.7152*G + 0.0722*B
  function luminance(r, g, b) { return 0.2126 * r + 0.7152 * g + 0.0722 * b; }
  const refLum = luminance(255, 255, 255);
  const EDGE_OPACITY_SCALE = {
    authored:   1,
    depends_on: refLum / luminance(239, 68, 68),
    contains:   refLum / luminance(16, 185, 129),
    contributed_to: refLum / luminance(168, 85, 247),
    has_minor: refLum / luminance(236, 72, 153),
    has_major: 1,
    tagged_with: refLum / luminance(6, 182, 212),
  };

  // Load data
  let raw;
  try {
    const resp = await fetch('/knowledge_graph.json');
    raw = await resp.json();
  } catch (e) {
    loadingEl.textContent = 'Failed to load knowledge_graph.json: ' + e.message;
    return;
  }
  loadingEl.style.display = 'none';

  // Build ALL nodes (kept permanently — D3 adds x/y/vx/vy to these)
  const allNodes = [];
  const nodeMap = new Map();

  for (const c of raw.nodes.contributors) {
    const node = {
      id: c.id,
      name: c.name,
      type: 'contributor',
      totalCommits: c.total_commits,
      createdAt: c.first_commit_at ? new Date(c.first_commit_at).getTime() : null,
      radius: Math.max(4, Math.min(16, 3 + Math.sqrt(c.total_commits))),
    };
    allNodes.push(node);
    nodeMap.set(c.id, node);
  }

  for (const f of raw.nodes.files) {
    const loc = f.latest_line_count || 0;
    const node = {
      id: f.id,
      name: f.name,
      type: 'file',
      deleted: f.deleted,
      fileType: f.file_type,
      lineCount: loc,
      summary: f.summary || null,
      createdAt: f.created_at ? new Date(f.created_at).getTime() : null,
      radius: loc > 0 ? Math.max(1.5, Math.min(12, 1.5 + Math.sqrt(loc) * 0.3)) : 1.5,
    };
    allNodes.push(node);
    nodeMap.set(f.id, node);
  }

  for (const cr of (raw.nodes.crates || [])) {
    const node = {
      id: cr.id,
      name: cr.name,
      type: 'crate',
      rootDir: cr.root_dir,
      edition: cr.edition,
      hasLib: cr.has_lib,
      hasBin: cr.has_bin,
      createdAt: cr.created_at ? new Date(cr.created_at).getTime() : null,
      radius: 8,
    };
    allNodes.push(node);
    nodeMap.set(cr.id, node);
  }

  for (const mc of (raw.nodes.major_concepts || [])) {
    const node = {
      id: mc.id,
      name: mc.name,
      type: 'major_concept',
      definition: mc.definition,
      evidence: mc.evidence || [],
      createdAt: null,
      radius: 10,
    };
    allNodes.push(node);
    nodeMap.set(mc.id, node);
  }

  for (const mc of (raw.nodes.minor_concepts || [])) {
    const node = {
      id: mc.id,
      name: mc.name,
      type: 'minor_concept',
      definition: mc.definition,
      evidence: mc.evidence || [],
      majorConcept: mc.major_concept,
      createdAt: null,
      radius: 6,
    };
    allNodes.push(node);
    nodeMap.set(mc.id, node);
  }

  // Synthetic root node — fixed at center, connects to major concepts
  const ROOT_ID = '__root__';
  const rootNode = {
    id: ROOT_ID,
    name: 'Codex',
    type: 'root',
    createdAt: null,
    radius: 14,
  };
  allNodes.push(rootNode);
  nodeMap.set(ROOT_ID, rootNode);

  // Build commit timestamp lookup
  const commitTs = new Map();
  if (raw.commits) {
    for (const [hash, c] of Object.entries(raw.commits)) {
      if (c.timestamp) commitTs.set(hash, new Date(c.timestamp).getTime());
    }
  }

  // Raw link data (never passed to D3 — source/target stay as strings)
  const allLinksRaw = raw.edges.map(e => {
    const link = {
      source: e.source,
      target: e.target,
      type: e.type || 'authored',
      commits: e.commits ? e.commits.length : 0,
    };
    // For authored edges, store earliest/latest commit timestamp
    if (e.commits && e.commits.length > 0) {
      let earliest = Infinity, latest = -Infinity;
      for (const h of e.commits) {
        const ts = commitTs.get(h);
        if (ts !== undefined) {
          if (ts < earliest) earliest = ts;
          if (ts > latest) latest = ts;
        }
      }
      if (earliest !== Infinity) { link.firstAt = earliest; link.lastAt = latest; }
    }
    // For contributed_to edges, store first contribution timestamp
    if (e.first_contribution_at) {
      link.firstContributionAt = new Date(e.first_contribution_at).getTime();
      link.totalCommits = e.total_commits || 0;
    }
    return link;
  });

  // Synthetic edges: root → each major concept
  for (const n of allNodes) {
    if (n.type === 'major_concept') {
      allLinksRaw.push({ source: ROOT_ID, target: n.id, type: 'has_major', commits: 0 });
    }
  }

  // Compute global time range and commit histogram for timeline
  const allTimestamps = [];
  for (const n of allNodes) { if (n.createdAt != null) allTimestamps.push(n.createdAt); }
  for (const ts of commitTs.values()) allTimestamps.push(ts);
  allTimestamps.sort((a, b) => a - b);
  const timeMin = allTimestamps.length ? allTimestamps[0] : 0;
  const timeMax = allTimestamps.length ? allTimestamps[allTimestamps.length - 1] : 1;

  // Commit histogram (for track background density)
  const HISTOGRAM_BINS = 200;
  const commitHist = new Float32Array(HISTOGRAM_BINS);
  const timeSpan = timeMax - timeMin || 1;
  for (const ts of commitTs.values()) {
    const bin = Math.min(HISTOGRAM_BINS - 1, Math.floor((ts - timeMin) / timeSpan * HISTOGRAM_BINS));
    commitHist[bin]++;
  }
  const histMax = Math.max(1, ...commitHist);

  // Free raw data
  raw = null;

  // --- Timeline setup ---
  let tlStart = timeMin;
  let tlEnd = timeMax;

  const tlTrack = document.getElementById('timeline-track');
  const tlFill = document.getElementById('timeline-fill');
  const tlHistEl = document.getElementById('timeline-hist');
  const tlLabelStart = document.getElementById('timeline-label-start');
  const tlLabelEnd = document.getElementById('timeline-label-end');
  const handleStart = document.getElementById('handle-start');
  const handleEnd = document.getElementById('handle-end');

  // Build histogram bars
  for (let i = 0; i < HISTOGRAM_BINS; i++) {
    const bar = document.createElement('div');
    bar.className = 'hist-bar';
    bar.style.height = (commitHist[i] / histMax * 100) + '%';
    tlHistEl.appendChild(bar);
  }

  function fmtDate(ms) {
    const d = new Date(ms);
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function tlFrac(ms) { return (ms - timeMin) / timeSpan; }

  function updateTimeline() {
    const sf = tlFrac(tlStart);
    const ef = tlFrac(tlEnd);
    tlFill.style.left = (sf * 100) + '%';
    tlFill.style.width = ((ef - sf) * 100) + '%';
    handleStart.style.left = (sf * 100) + '%';
    handleEnd.style.left = 'calc(' + (ef * 100) + '% - 10px)';
    tlLabelStart.textContent = fmtDate(tlStart);
    tlLabelEnd.textContent = fmtDate(tlEnd);
  }
  updateTimeline();

  // Drag handles
  function handleDrag(handleEl, isEnd) {
    let dragging = false;
    function onDown(e) {
      e.preventDefault();
      dragging = true;
      handleEl.classList.add('active');
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }
    function onMove(e) {
      if (!dragging) return;
      const rect = tlTrack.getBoundingClientRect();
      let frac = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      const ms = timeMin + frac * timeSpan;
      if (isEnd) {
        tlEnd = Math.max(tlStart + timeSpan * 0.002, ms);
      } else {
        tlStart = Math.min(tlEnd - timeSpan * 0.002, ms);
      }
      updateTimeline();
      rebuildGraph();
    }
    function onUp() {
      dragging = false;
      handleEl.classList.remove('active');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    handleEl.addEventListener('mousedown', onDown);
  }
  handleDrag(handleStart, false);
  handleDrag(handleEnd, true);

  // Click on track to jump the nearest handle
  tlTrack.addEventListener('click', (e) => {
    if (e.target.classList.contains('timeline-handle')) return;
    const rect = tlTrack.getBoundingClientRect();
    const frac = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    const ms = timeMin + frac * timeSpan;
    // Move whichever handle is closer
    const dStart = Math.abs(ms - tlStart);
    const dEnd = Math.abs(ms - tlEnd);
    if (dStart < dEnd) {
      tlStart = Math.min(tlEnd - timeSpan * 0.002, ms);
    } else {
      tlEnd = Math.max(tlStart + timeSpan * 0.002, ms);
    }
    updateTimeline();
    rebuildGraph();
  });

  // --- Active simulation data (rebuilt when "off" toggles change) ---
  let nodes = [];
  let links = [];
  let adjacency = new Map();

  // --- Visibility state: 'visible' | 'hidden' | 'off' ---
  const vis = {
    contributors: 'visible',
    activeSource: 'visible',
    otherFiles: 'off',
    crates: 'visible',
    majorConcepts: 'visible',
    minorConcepts: 'visible',
    authored: 'visible',
    dependsOn: 'visible',
    contains: 'visible',
    contributedTo: 'visible',
    hasMinor: 'visible',
    taggedWith: 'visible',
  };

  // Source code file extensions
  const SOURCE_CODE_EXTS = new Set([
    'rs', 'py', 'js', 'ts', 'jsx', 'tsx', 'mjs', 'cjs',
    'go', 'c', 'cpp', 'cc', 'cxx', 'h', 'hpp', 'hxx',
    'java', 'kt', 'kts', 'scala', 'cs', 'fs', 'rb', 'php',
    'swift', 'm', 'mm', 'r', 'lua', 'pl', 'pm', 'sh', 'bash',
    'zsh', 'ps1', 'bat', 'hs', 'ml', 'mli', 'ex', 'exs',
    'erl', 'clj', 'cljs', 'dart', 'asm', 's', 'sql',
    'html', 'css', 'scss', 'less', 'vue', 'svelte',
  ]);

  function isActiveSourceCode(node) {
    return node.type === 'file' && !node.deleted && SOURCE_CODE_EXTS.has(node.fileType);
  }

  function nodeTypeState(node) {
    if (node.type === 'root') return 'visible'; // always visible
    if (node.type === 'contributor') return vis.contributors;
    if (node.type === 'crate') return vis.crates;
    if (node.type === 'major_concept') return vis.majorConcepts;
    if (node.type === 'minor_concept') return vis.minorConcepts;
    if (node.type === 'file') return isActiveSourceCode(node) ? vis.activeSource : vis.otherFiles;
    return vis.otherFiles;
  }

  function linkTypeState(link) {
    if (link.type === 'authored') return vis.authored;
    if (link.type === 'depends_on') return vis.dependsOn;
    if (link.type === 'contains') return vis.contains;
    if (link.type === 'contributed_to') return vis.contributedTo;
    if (link.type === 'has_minor') return vis.hasMinor;
    if (link.type === 'has_major') return vis.majorConcepts; // tied to major concepts visibility
    if (link.type === 'tagged_with') return vis.taggedWith;
    return 'visible';
  }

  // Timeline filter: node created within [tlStart, tlEnd]
  function nodeInTimeRange(node) {
    if (node.createdAt == null) return true; // no timestamp → always show
    return node.createdAt >= tlStart && node.createdAt <= tlEnd;
  }

  // Timeline filter for edges
  function linkInTimeRange(link) {
    if (link.type === 'authored') {
      // Show if any commit falls in the time range
      if (link.firstAt != null) return link.lastAt >= tlStart && link.firstAt <= tlEnd;
      return true; // no timestamp data → show
    }
    if (link.type === 'contributed_to') {
      if (link.firstContributionAt != null) return link.firstContributionAt <= tlEnd;
      return true;
    }
    // depends_on / contains: visible when both endpoints pass
    return true;
  }

  // For draw: is this node rendered?
  function nodeDrawn(node) {
    return nodeTypeState(node) === 'visible';
  }

  // For draw: is this link rendered?
  function linkDrawn(link) {
    const s = link.source;
    const t = link.target;
    if (!nodeDrawn(s) || !nodeDrawn(t)) return false;
    return linkTypeState(link) === 'visible';
  }

  function getNodeScale(node) {
    if (node.type === 'root') return conceptScale;
    if (node.type === 'contributor') return contributorScale;
    if (node.type === 'crate') return crateScale;
    if (node.type === 'major_concept' || node.type === 'minor_concept') return conceptScale;
    return fileScale;
  }

  function updateStats() {
    const nc = nodes.filter(n => n.type === 'contributor').length;
    const nf = nodes.filter(n => n.type === 'file').length;
    const ncr = nodes.filter(n => n.type === 'crate').length;
    const ncon = nodes.filter(n => n.type === 'major_concept' || n.type === 'minor_concept').length;
    statsEl.style.display = 'block';
    statsEl.textContent = `${nc} contributors | ${nf} files | ${ncr} crates | ${ncon} concepts | ${links.length} edges`;
  }

  function rebuildGraph() {
    // Clear hover state (hovered node may no longer exist in the graph)
    hoveredNode = null;
    tooltip.style.display = 'none';

    // Filter nodes — 'visible' and 'hidden' are in simulation, 'off' is excluded
    // Also apply timeline range filter
    nodes = allNodes.filter(n => nodeTypeState(n) !== 'off' && nodeInTimeRange(n));
    const activeIds = new Set(nodes.map(n => n.id));

    // Filter candidate edges (before D3 mutates source/target)
    let filteredLinks = allLinksRaw.filter(l => {
      if (!activeIds.has(l.source) || !activeIds.has(l.target)) return false;
      if (linkTypeState(l) === 'off') return false;
      return linkInTimeRange(l);
    });

    // Centric mode: BFS from selected nodes, filter by depth
    if (centricMode && selectedNodes.size > 0) {
      // Build BFS adjacency from candidate edges
      const bfsAdj = new Map();
      for (const e of filteredLinks) {
        if (!bfsAdj.has(e.source)) bfsAdj.set(e.source, []);
        if (!bfsAdj.has(e.target)) bfsAdj.set(e.target, []);
        bfsAdj.get(e.source).push(e.target);
        bfsAdj.get(e.target).push(e.source);
      }

      // BFS from selected nodes
      const depthMap = new Map();
      const queue = [];
      for (const id of selectedNodes) {
        if (activeIds.has(id)) {
          depthMap.set(id, 0);
          queue.push(id);
        }
      }
      let qi = 0;
      while (qi < queue.length) {
        const id = queue[qi++];
        const d = depthMap.get(id);
        if (d >= centricDepth) continue;
        for (const neighbor of (bfsAdj.get(id) || [])) {
          if (!depthMap.has(neighbor)) {
            depthMap.set(neighbor, d + 1);
            queue.push(neighbor);
          }
        }
      }

      // Keep only nodes within depth range
      nodes = nodes.filter(n => depthMap.has(n.id));

      // Keep edges where both endpoints are in range and at least one
      // is strictly inside the boundary (discovery-order rule)
      filteredLinks = filteredLinks.filter(e => {
        const ds = depthMap.get(e.source);
        const dt = depthMap.get(e.target);
        if (ds === undefined || dt === undefined) return false;
        return Math.min(ds, dt) < centricDepth;
      });
    }

    // Create fresh link objects (D3 mutates source/target to object refs)
    links = filteredLinks.map(l => ({ ...l }));

    // Rebuild adjacency
    adjacency = new Map();
    for (const l of links) {
      // source/target are still strings here (fresh copies)
      if (!adjacency.has(l.source)) adjacency.set(l.source, new Set());
      if (!adjacency.has(l.target)) adjacency.set(l.target, new Set());
      adjacency.get(l.source).add(l.target);
      adjacency.get(l.target).add(l.source);
    }

    // Update simulation
    simulation.nodes(nodes);
    linkForce.links(links);
    collisionForce.radius(d => d.radius + collisionPadding);
    simulation.alpha(1).restart();

    updateStats();
  }

  // --- Simulation setup (initial empty — rebuildGraph populates) ---
  const linkForce = d3.forceLink([]).id(d => d.id).distance(30).strength(0.1);
  const chargeForce = d3.forceManyBody().strength(-8).distanceMax(200).distanceMin(1).theta(0.9);
  let centerX = width / 2, centerY = height / 2;

  // Custom center gravity: attractive when positive, repulsive with falloff when negative
  function makeCenterGravity() {
    let strength = 0.05, falloffRadius = 400, _nodes = [];
    function force(alpha) {
      for (const n of _nodes) {
        const dx = centerX - n.x;
        const dy = centerY - n.y;
        if (strength >= 0) {
          // Standard linear spring toward center
          n.vx += dx * strength * alpha;
          n.vy += dy * strength * alpha;
        } else {
          // Repulsive with distance falloff + weak global pull to contain
          const dist = Math.sqrt(dx * dx + dy * dy);
          const pull = 0.005;
          n.vx += dx * pull * alpha;
          n.vy += dy * pull * alpha;
          if (dist >= falloffRadius || dist < 1e-6) continue;
          const t = 1 - dist / falloffRadius;
          n.vx += dx * strength * t * t * alpha;
          n.vy += dy * strength * t * t * alpha;
        }
      }
    }
    force.initialize = function(n) { _nodes = n; };
    force.strength = function(v) { return arguments.length ? (strength = v, force) : strength; };
    force.falloffRadius = function(v) { return arguments.length ? (falloffRadius = v, force) : falloffRadius; };
    return force;
  }

  const centerGravity = makeCenterGravity();
  const collisionForce = d3.forceCollide().radius(d => d.radius + 0.5).strength(0.3).iterations(1);

  const simulation = d3.forceSimulation([])
    .force('link', linkForce)
    .force('charge', chargeForce)
    .force('center', centerGravity)
    .force('collision', collisionForce)
    .alphaDecay(0.01)
    .alphaMin(0.001)
    .alphaTarget(0)
    .velocityDecay(0.3)
    .on('tick', draw);

  // --- Appearance state ---
  let contributorScale = 1;
  let fileScale = 1;
  let crateScale = 1;
  let conceptScale = 1;
  let edgeWidth = 0.5;
  let edgeOpacity = 0.04;
  let highlightEdgeWidth = 1;
  let highlightEdgeOpacity = 0.35;
  let commitWidthScale = 0;
  let fixedSize = true;
  let collisionPadding = 0.5;

  // --- Shared UI builders ---
  function makeGroup(title, parent) {
    const div = document.createElement('div');
    div.className = 'ctrl-group';
    div.innerHTML = `<div class="ctrl-group-title">${title}</div>`;
    parent.appendChild(div);
    return div;
  }

  function makeSlider(parent, label, min, max, step, value, onChange) {
    const row = document.createElement('div');
    row.className = 'ctrl-row';
    const valDisplay = document.createElement('span');
    valDisplay.className = 'ctrl-val';
    valDisplay.textContent = Number(value).toFixed(step < 0.01 ? 4 : step < 1 ? 2 : 0);
    const input = document.createElement('input');
    input.type = 'range';
    input.min = min;
    input.max = max;
    input.step = step;
    input.value = value;
    input.addEventListener('input', () => {
      const v = parseFloat(input.value);
      valDisplay.textContent = Number(v).toFixed(step < 0.01 ? 4 : step < 1 ? 2 : 0);
      onChange(v);
      simulation.alpha(Math.max(simulation.alpha(), 0.1)).restart();
    });
    const lbl = document.createElement('label');
    lbl.textContent = label;
    row.appendChild(lbl);
    row.appendChild(input);
    row.appendChild(valDisplay);
    parent.appendChild(row);
    return input;
  }

  function makeCheckbox(parent, label, checked, onChange) {
    const row = document.createElement('div');
    row.className = 'ctrl-check';
    const input = document.createElement('input');
    input.type = 'checkbox';
    input.checked = checked;
    input.id = 'chk-' + label.replace(/\s/g, '-');
    input.addEventListener('change', () => onChange(input.checked));
    const lbl = document.createElement('label');
    lbl.textContent = label;
    lbl.htmlFor = input.id;
    row.appendChild(input);
    row.appendChild(lbl);
    parent.appendChild(row);
    return input;
  }

  function makeTriSwitch(parent, label, initial, onChange) {
    const row = document.createElement('div');
    row.className = 'tri-switch';
    const btns = document.createElement('div');
    btns.className = 'tri-switch-btns';

    const states = [
      { value: 'visible', text: 'Show', cls: 'active-visible', title: 'Visible — rendered and in simulation' },
      { value: 'hidden',  text: 'Hide', cls: 'active-hidden',  title: 'Hidden — in simulation but not rendered' },
      { value: 'off',     text: 'Off',  cls: 'active-off',     title: 'Off — removed from simulation entirely' },
    ];

    const buttons = [];
    for (const s of states) {
      const btn = document.createElement('button');
      btn.className = 'tri-switch-btn' + (s.value === initial ? ' ' + s.cls : '');
      btn.textContent = s.text;
      btn.title = s.title;
      btn.dataset.value = s.value;
      btn.dataset.cls = s.cls;
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.className = 'tri-switch-btn');
        btn.className = 'tri-switch-btn ' + s.cls;
        onChange(s.value);
      });
      buttons.push(btn);
      btns.appendChild(btn);
    }

    const lbl = document.createElement('span');
    lbl.className = 'tri-switch-label';
    lbl.textContent = label;

    row.appendChild(btns);
    row.appendChild(lbl);
    parent.appendChild(row);
  }

  // --- Appearance panel ---
  const appearBody = document.getElementById('appear-body');

  // --- Mode group ---
  const modeGroup = makeGroup('Mode', appearBody);

  const modeRow = document.createElement('div');
  modeRow.className = 'mode-switch';
  const modeBtns = document.createElement('div');
  modeBtns.className = 'mode-switch-btns';

  const freeBtn = document.createElement('button');
  freeBtn.className = 'mode-switch-btn';
  freeBtn.textContent = 'Free';
  freeBtn.addEventListener('click', () => {
    if (!centricMode) return;
    centricMode = false;
    freeBtn.classList.add('active');
    centricBtn.classList.remove('active');
    depthRow.classList.add('disabled');
    rebuildGraph();
  });

  const centricBtn = document.createElement('button');
  centricBtn.className = 'mode-switch-btn active';
  centricBtn.textContent = 'Centric';
  centricBtn.title = '';
  centricBtn.disabled = false;
  centricBtn.addEventListener('click', () => {
    if (centricBtn.disabled || centricMode) return;
    centricMode = true;
    centricBtn.classList.add('active');
    freeBtn.classList.remove('active');
    depthRow.classList.remove('disabled');
    rebuildGraph();
  });

  modeBtns.appendChild(freeBtn);
  modeBtns.appendChild(centricBtn);
  modeRow.appendChild(modeBtns);
  const modeLabel = document.createElement('span');
  modeLabel.className = 'tri-switch-label';
  modeLabel.textContent = 'View Mode';
  modeRow.appendChild(modeLabel);
  modeGroup.appendChild(modeRow);

  // Depth slider (disabled in Free mode)
  const depthRow = document.createElement('div');
  depthRow.className = 'ctrl-row';
  const depthLabel = document.createElement('label');
  depthLabel.textContent = 'Depth';
  const depthWrap = document.createElement('div');
  depthWrap.className = 'depth-slider-wrap';
  const depthInput = document.createElement('input');
  depthInput.type = 'range';
  depthInput.min = 0;
  depthInput.max = 4;
  depthInput.step = 1;
  depthInput.value = 0;
  const depthTicks = document.createElement('div');
  depthTicks.className = 'depth-ticks';
  for (let i = 0; i <= 4; i++) {
    const tick = document.createElement('span');
    tick.textContent = i;
    depthTicks.appendChild(tick);
  }
  depthWrap.appendChild(depthInput);
  depthWrap.appendChild(depthTicks);
  depthInput.addEventListener('input', () => {
    centricDepth = parseInt(depthInput.value);
    if (centricMode) rebuildGraph();
  });
  depthRow.appendChild(depthLabel);
  depthRow.appendChild(depthWrap);
  modeGroup.appendChild(depthRow);

  function updateCentricAvailability() {
    const canCentric = selectedNodes.size > 0;
    centricBtn.disabled = !canCentric;
    centricBtn.title = canCentric ? '' : 'Please select at least 1 node';
    if (!canCentric && centricMode) {
      centricMode = false;
      freeBtn.classList.add('active');
      centricBtn.classList.remove('active');
      depthRow.classList.add('disabled');
      rebuildGraph();
    }
  }

  // Visibility group — tri-switches
  const visGroup = makeGroup('Visibility', appearBody);

  function onVisChange(key, needsRebuild) {
    return (value) => {
      const wasOff = vis[key] === 'off';
      vis[key] = value;
      const isOff = value === 'off';
      if (wasOff !== isOff) {
        rebuildGraph();
      } else {
        draw();
      }
    };
  }

  makeTriSwitch(visGroup, 'Contributors',        'visible', onVisChange('contributors'));
  makeTriSwitch(visGroup, 'Active Source Code',  'visible', onVisChange('activeSource'));
  makeTriSwitch(visGroup, 'All Other Files',     'off',     onVisChange('otherFiles'));
  makeTriSwitch(visGroup, 'Crates',              'visible', onVisChange('crates'));
  makeTriSwitch(visGroup, 'Major Concepts',      'visible', onVisChange('majorConcepts'));
  makeTriSwitch(visGroup, 'Minor Concepts',      'visible', onVisChange('minorConcepts'));
  makeTriSwitch(visGroup, 'Authored edges',       'visible', onVisChange('authored'));
  makeTriSwitch(visGroup, 'Dependency edges',    'visible', onVisChange('dependsOn'));
  makeTriSwitch(visGroup, 'Contains edges',      'visible', onVisChange('contains'));
  makeTriSwitch(visGroup, 'Contributed-to edges', 'visible', onVisChange('contributedTo'));
  makeTriSwitch(visGroup, 'Has-minor edges',     'visible', onVisChange('hasMinor'));
  makeTriSwitch(visGroup, 'Tagged-with edges',   'visible', onVisChange('taggedWith'));

  // Node sizing group
  const nodeGroup = makeGroup('Nodes', appearBody);
  makeSlider(nodeGroup, 'Contributor Size', 0.1, 5, 0.1, 1, v => { contributorScale = v; draw(); });
  makeSlider(nodeGroup, 'File Size', 0.1, 5, 0.1, 1, v => { fileScale = v; draw(); });
  makeSlider(nodeGroup, 'Crate Size', 0.1, 5, 0.1, 1, v => { crateScale = v; draw(); });
  makeSlider(nodeGroup, 'Concept Size', 0.1, 5, 0.1, 1, v => { conceptScale = v; draw(); });
  makeCheckbox(nodeGroup, 'Fixed size (ignore zoom)', true, v => { fixedSize = v; draw(); });

  const edgeGroup = makeGroup('Edges', appearBody);
  makeSlider(edgeGroup, 'Width', 0.1, 5, 0.1, 0.5, v => { edgeWidth = v; draw(); });
  makeSlider(edgeGroup, 'Opacity', 0, 0.3, 0.005, 0.04, v => { edgeOpacity = v; draw(); });
  makeSlider(edgeGroup, 'Commit Width', 0, 3, 0.05, 0, v => { commitWidthScale = v; draw(); });
  makeSlider(edgeGroup, 'Highlight Width', 0.1, 5, 0.1, 1, v => { highlightEdgeWidth = v; draw(); });
  makeSlider(edgeGroup, 'Highlight Opacity', 0, 1, 0.01, 0.35, v => { highlightEdgeOpacity = v; draw(); });

  // --- Force controls panel ---
  const ctrlBody = document.getElementById('ctrl-body');

  const simGroup = makeGroup('Simulation', ctrlBody);
  makeSlider(simGroup, 'Alpha', 0, 1, 0.01, 0.01, v => simulation.alpha(v));
  makeSlider(simGroup, 'Alpha Decay', 0, 0.1, 0.001, 0.01, v => simulation.alphaDecay(v));
  makeSlider(simGroup, 'Alpha Min', 0, 0.1, 0.001, 0.001, v => simulation.alphaMin(v));
  makeSlider(simGroup, 'Alpha Target', 0, 1, 0.01, 0, v => simulation.alphaTarget(v));
  makeSlider(simGroup, 'Velocity Decay', 0, 1, 0.01, 0.3, v => simulation.velocityDecay(v));

  const linkGroup = makeGroup('Link Force', ctrlBody);
  makeSlider(linkGroup, 'Distance', 1, 300, 1, 30, v => { linkForce.distance(v); });
  makeSlider(linkGroup, 'Strength', 0, 2, 0.01, 0.1, v => { linkForce.strength(v); });
  makeSlider(linkGroup, 'Iterations', 1, 10, 1, 1, v => { linkForce.iterations(v); });

  const chargeGroup = makeGroup('Charge (Many-Body)', ctrlBody);
  makeSlider(chargeGroup, 'Strength', -100, 10, 0.5, -8, v => { chargeForce.strength(v); });
  makeSlider(chargeGroup, 'Distance Min', 0, 50, 0.5, 1, v => { chargeForce.distanceMin(v); });
  makeSlider(chargeGroup, 'Distance Max', 50, 2000, 10, 200, v => { chargeForce.distanceMax(v); });
  makeSlider(chargeGroup, 'Theta', 0, 2, 0.01, 0.9, v => { chargeForce.theta(v); });

  const centerGroup = makeGroup('Center Gravity', ctrlBody);
  makeSlider(centerGroup, 'Strength', -0.5, 0.5, 0.005, 0.05, v => {
    centerGravity.strength(v);
    if (v < 0) centerGravity.falloffRadius(50 + (Math.abs(v) / 0.5) * 1950);
  });

  const collGroup = makeGroup('Collision', ctrlBody);
  makeSlider(collGroup, 'Strength', 0, 2, 0.01, 0.3, v => { collisionForce.strength(v); });
  makeSlider(collGroup, 'Padding', 0, 10, 0.5, 0.5, v => {
    collisionPadding = v;
    collisionForce.radius(d => d.radius + v);
  });
  makeSlider(collGroup, 'Iterations', 1, 10, 1, 1, v => { collisionForce.iterations(v); });

  const btnRow = document.createElement('div');
  btnRow.style.marginTop = '8px';
  const reheatBtn = document.createElement('button');
  reheatBtn.className = 'ctrl-btn';
  reheatBtn.textContent = 'Reheat';
  reheatBtn.onclick = () => { simulation.alpha(1).restart(); };
  const stopBtn = document.createElement('button');
  stopBtn.className = 'ctrl-btn';
  stopBtn.textContent = 'Stop';
  stopBtn.onclick = () => { simulation.stop(); };
  btnRow.appendChild(reheatBtn);
  btnRow.appendChild(stopBtn);
  ctrlBody.appendChild(btnRow);

  // Zoom
  let transform = d3.zoomIdentity;
  const zoom = d3.zoom()
    .scaleExtent([0.05, 20])
    .filter((event) => {
      // Allow wheel/pinch zoom everywhere, but suppress pan (mousedown)
      // when the pointer is over a node so d3-drag can handle it instead.
      if (event.type === 'mousedown') {
        const rect = canvas.getBoundingClientRect();
        const mx = event.clientX - rect.left;
        const my = event.clientY - rect.top;
        if (nodeAt(mx, my)) return false;
      }
      return !event.button; // default d3 filter: ignore right-click
    })
    .on('zoom', (event) => {
      transform = event.transform;
      draw();
    });
  d3.select(canvas).call(zoom);

  // State
  let hoveredNode = null;
  let draggedNode = null;
  const selectedNodes = new Set(); // node IDs that are pinned
  let centricMode = true;
  let centricDepth = 0;

  // Fix root node at center and select it
  rootNode.fx = centerX;
  rootNode.fy = centerY;
  selectedNodes.add(ROOT_ID);

  // --- Initial graph build ---
  rebuildGraph();

  // Draw
  function draw() {
    ctx.save();
    ctx.clearRect(0, 0, width, height);
    ctx.translate(transform.x, transform.y);
    ctx.scale(transform.k, transform.k);

    const highlightSet = new Set();
    if (hoveredNode && nodeDrawn(hoveredNode)) {
      highlightSet.add(hoveredNode.id);
      const neighbors = adjacency.get(hoveredNode.id);
      if (neighbors) neighbors.forEach(n => highlightSet.add(n));
    }

    // Size compensation for fixed-size mode
    const zk = fixedSize ? (1 / transform.k) : 1;

    // Center cross marker
    const crossSize = 10 * zk;
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
    ctx.lineWidth = 1 * zk;
    ctx.beginPath();
    ctx.moveTo(centerX - crossSize, centerY);
    ctx.lineTo(centerX + crossSize, centerY);
    ctx.moveTo(centerX, centerY - crossSize);
    ctx.lineTo(centerX, centerY + crossSize);
    ctx.stroke();

    // Falloff radius ring (visible when repulsive)
    if (centerGravity.strength() < 0) {
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
      ctx.lineWidth = 1 * zk;
      ctx.setLineDash([4 * zk, 4 * zk]);
      ctx.beginPath();
      ctx.arc(centerX, centerY, centerGravity.falloffRadius(), 0, 2 * Math.PI);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Edges
    for (const link of links) {
      if (!linkDrawn(link)) continue;

      const s = link.source;
      const t = link.target;
      const rgb = EDGE_RGB[link.type] || EDGE_RGB.authored;
      const opScale = EDGE_OPACITY_SCALE[link.type] || 1;

      let hl = hoveredNode && highlightSet.has(s.id) && highlightSet.has(t.id);
      const alpha = hl
        ? Math.min(highlightEdgeOpacity * opScale, 1)
        : Math.min(edgeOpacity * opScale, 1);
      let commitExtra = 0;
      if (commitWidthScale > 0 && (link.type === 'authored' || link.type === 'contributed_to')) {
        const count = link.type === 'authored' ? link.commits : (link.totalCommits || 0);
        commitExtra = commitWidthScale * Math.sqrt(count);
      }
      const lw = hl ? (highlightEdgeWidth + commitExtra) * zk : (edgeWidth + commitExtra) * zk;

      ctx.strokeStyle = `rgba(${rgb}, ${alpha})`;
      ctx.lineWidth = lw;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(t.x, t.y);
      ctx.stroke();

      // Arrowhead for directed edges (depends_on)
      if (link.type === 'depends_on') {
        const dx = t.x - s.x;
        const dy = t.y - s.y;
        const len = Math.sqrt(dx * dx + dy * dy);
        if (len < 1e-6) continue;
        const ux = dx / len;
        const uy = dy / len;
        // Place arrow tip at the edge of the target node
        const tScale = getNodeScale(t);
        const tr = t.radius * tScale * zk;
        const tipX = t.x - ux * tr;
        const tipY = t.y - uy * tr;
        const arrowLen = Math.max(6 * zk, lw * 4);
        const arrowW = arrowLen * 0.5;
        const baseX = tipX - ux * arrowLen;
        const baseY = tipY - uy * arrowLen;
        ctx.fillStyle = `rgba(${rgb}, ${alpha})`;
        ctx.beginPath();
        ctx.moveTo(tipX, tipY);
        ctx.lineTo(baseX - uy * arrowW, baseY + ux * arrowW);
        ctx.lineTo(baseX + uy * arrowW, baseY - ux * arrowW);
        ctx.closePath();
        ctx.fill();
      }
    }

    // Nodes
    const dimAlpha = hoveredNode ? 0.15 : 1;
    for (const node of nodes) {
      if (!nodeDrawn(node)) continue;

      const highlighted = highlightSet.has(node.id);
      const alpha = hoveredNode ? (highlighted ? 1 : dimAlpha) : 1;
      const scale = getNodeScale(node);
      const r = node.radius * scale * zk;

      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(node.x, node.y, r, 0, 2 * Math.PI);

      if (node.type === 'root') {
        ctx.fillStyle = ROOT_COLOR;
      } else if (node.type === 'contributor') {
        ctx.fillStyle = CONTRIBUTOR_COLOR;
      } else if (node.type === 'crate') {
        ctx.fillStyle = CRATE_COLOR;
      } else if (node.type === 'major_concept') {
        ctx.fillStyle = MAJOR_CONCEPT_COLOR;
      } else if (node.type === 'minor_concept') {
        ctx.fillStyle = MINOR_CONCEPT_COLOR;
      } else if (node.deleted) {
        ctx.fillStyle = DELETED_FILE_COLOR;
      } else {
        ctx.fillStyle = FILE_COLOR;
      }
      ctx.fill();

      // Selection ring
      if (selectedNodes.has(node.id)) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = Math.max(1.5 * zk, 1);
        ctx.beginPath();
        ctx.arc(node.x, node.y, r + 2 * zk, 0, 2 * Math.PI);
        ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;

    // Label for hovered node
    if (hoveredNode && nodeDrawn(hoveredNode)) {
      const hScale = getNodeScale(hoveredNode);
      const hR = hoveredNode.radius * hScale * zk;
      const fontSize = Math.max(10, 12 * zk);
      ctx.font = `bold ${fontSize}px -apple-system, sans-serif`;
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'bottom';
      ctx.fillText(hoveredNode.name, hoveredNode.x + hR + 4 * zk, hoveredNode.y - 4 * zk);
    }

    ctx.restore();
  }

  // Hit detection
  function nodeAt(mx, my) {
    const sx = (mx - transform.x) / transform.k;
    const sy = (my - transform.y) / transform.k;
    const zk = fixedSize ? (1 / transform.k) : 1;
    let closest = null;
    let closestDist = Infinity;
    for (let i = nodes.length - 1; i >= 0; i--) {
      const n = nodes[i];
      if (!nodeDrawn(n)) continue;
      const scale = getNodeScale(n);
      const dx = sx - n.x;
      const dy = sy - n.y;
      const dist = dx * dx + dy * dy;
      const hitRadius = Math.max(n.radius * scale * zk, 5 / transform.k);
      if (dist < hitRadius * hitRadius && dist < closestDist) {
        closest = n;
        closestDist = dist;
      }
    }
    return closest;
  }

  // Mouse events
  canvas.addEventListener('mousemove', (e) => {
    if (draggedNode) return;
    const node = nodeAt(e.clientX, e.clientY);
    if (node !== hoveredNode) {
      hoveredNode = node;
      canvas.style.cursor = node ? 'pointer' : 'default';
      if (node) {
        tooltip.style.display = 'block';
        let html = `<div class="value">${node.name}</div>`;
        if (node.type === 'root') {
          html += `<div class="label">Root node</div>`;
        } else if (node.type === 'contributor') {
          html += `<div class="label">Contributor | ${node.totalCommits} commits</div>`;
        } else if (node.type === 'crate') {
          const targets = [];
          if (node.hasLib) targets.push('lib');
          if (node.hasBin) targets.push('bin');
          html += `<div class="label">Crate | edition ${node.edition} | ${targets.join(', ') || 'no targets'}</div>`;
          html += `<div class="label">${node.rootDir}</div>`;
          if (node.createdAt) html += `<div class="label">Created ${new Date(node.createdAt).toLocaleDateString()}</div>`;
        } else if (node.type === 'major_concept') {
          html += `<div class="label">Major Concept</div>`;
          html += `<div class="label" style="white-space:normal;max-width:350px">${node.definition}</div>`;
          if (node.evidence.length) html += `<div class="label">${node.evidence.length} evidence files</div>`;
        } else if (node.type === 'minor_concept') {
          html += `<div class="label">Minor Concept</div>`;
          html += `<div class="label" style="white-space:normal;max-width:350px">${node.definition}</div>`;
          if (node.evidence.length) html += `<div class="label">${node.evidence.length} evidence files</div>`;
        } else {
          const locStr = node.lineCount > 0 ? ` | ${node.lineCount.toLocaleString()} lines` : '';
          html += `<div class="label">File${node.deleted ? ' (deleted)' : ''} | ${node.fileType || 'unknown'}${locStr}</div>`;
          if (node.summary) html += `<div class="label" style="white-space:normal;max-width:350px">${node.summary}</div>`;
        }
        const neighbors = adjacency.get(node.id);
        if (neighbors) html += `<div class="label">${neighbors.size} connections</div>`;
        if (selectedNodes.has(node.id)) html += `<div class="label" style="color:#93c5fd">Pinned (click to unpin)</div>`;
        tooltip.innerHTML = html;
      } else {
        tooltip.style.display = 'none';
      }
      draw();
    }
    if (hoveredNode) {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY + 24) + 'px';
    }
  });

  canvas.addEventListener('mouseleave', () => {
    hoveredNode = null;
    tooltip.style.display = 'none';
    draw();
  });

  // Drag (with click-to-select)
  let dragStartX = 0, dragStartY = 0;
  const CLICK_THRESHOLD = 4; // px — below this, treat as click not drag

  d3.select(canvas).call(
    d3.drag()
      .container(canvas)
      .subject((event) => {
        const node = nodeAt(event.x, event.y);
        if (node) {
          node.x = transform.applyX(node.x);
          node.y = transform.applyY(node.y);
        }
        return node;
      })
      .on('start', (event) => {
        if (event.subject.id === ROOT_ID) return; // root is immovable
        if (!event.active) simulation.alphaTarget(0.1).restart();
        draggedNode = event.subject;
        dragStartX = event.x;
        dragStartY = event.y;
        event.subject.fx = transform.invertX(event.x);
        event.subject.fy = transform.invertY(event.y);
        tooltip.style.display = 'none';
      })
      .on('drag', (event) => {
        if (event.subject.id === ROOT_ID) return;
        event.subject.fx = transform.invertX(event.x);
        event.subject.fy = transform.invertY(event.y);
      })
      .on('end', (event) => {
        if (event.subject.id === ROOT_ID) return;
        if (!event.active) simulation.alphaTarget(0);
        const node = event.subject;
        const dx = event.x - dragStartX;
        const dy = event.y - dragStartY;
        const wasDragged = Math.sqrt(dx * dx + dy * dy) >= CLICK_THRESHOLD;

        if (!wasDragged) {
          // Click — toggle selection
          if (selectedNodes.has(node.id)) {
            selectedNodes.delete(node.id);
            node.fx = null;
            node.fy = null;
          } else {
            selectedNodes.add(node.id);
            // keep fx/fy at current position
          }
          updateCentricAvailability();
          if (centricMode) rebuildGraph();
        } else if (selectedNodes.has(node.id)) {
          // Dragged a selected node — keep it pinned at new position
        } else {
          // Dragged an unselected node — release
          node.fx = null;
          node.fy = null;
        }
        draggedNode = null;
        draw();
      })
  );

  // Escape to deselect all
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && selectedNodes.size > 0) {
      for (const node of allNodes) {
        if (selectedNodes.has(node.id) && node.id !== ROOT_ID) {
          node.fx = null;
          node.fy = null;
        }
      }
      selectedNodes.clear();
      // Root always stays selected
      selectedNodes.add(ROOT_ID);
      updateCentricAvailability(); // switches back to Free if in centric mode
      draw();
    }
  });
})();
</script>
</body>
</html>
